<!DOCTYPE html>
<!--
  =====================================================================
  순수본 식품본부 · 사용자 관리 (관리자 전용)
  - 가입한 사용자 목록을 보고 승인(pending → user) / 역할 변경 / 활성 토글
  - admin 만 접근 가능
  =====================================================================
-->
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>사용자 관리 · 순수본</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=IBM+Plex+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root { --bg:#f4f1ea; --ink:#2b2620; --muted:#8a8073; --line:#e2dccf;
      --accent:#3f6b46; --accent-dk:#2d4e32; --card:#ffffff; --field:#fbf9f4; --warn:#9a7b1f; --warn-bg:#f6efd8; }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { font-family:'IBM Plex Sans KR', sans-serif; background:var(--bg); color:var(--ink);
      background-image:radial-gradient(var(--line) 1px, transparent 1px); background-size:22px 22px;
      padding:32px 20px 60px; line-height:1.5; }
    .wrap { max-width:920px; margin:0 auto; }
    .topbar { display:flex; justify-content:space-between; align-items:center; margin-bottom:24px; }
    .eyebrow { font-size:12px; letter-spacing:0.14em; text-transform:uppercase; color:var(--accent); font-weight:600; }
    h1 { font-family:'Gowun Batang', serif; font-size:28px; margin-top:4px; }
    .link { font-size:13px; font-weight:600; color:var(--accent); text-decoration:none; border:1px solid var(--line);
      background:var(--card); border-radius:8px; padding:9px 14px; }
    .panel { background:var(--card); border:1px solid var(--line); border-radius:16px; padding:10px 18px 18px;
      box-shadow:0 14px 40px -30px rgba(43,38,32,0.45); }
    table { width:100%; border-collapse:collapse; font-size:13.5px; }
    th, td { padding:12px 10px; text-align:left; border-bottom:1px solid var(--line); vertical-align:middle; }
    th { font-size:12px; color:var(--muted); font-weight:600; }
    td .email { font-weight:600; }
    td .sub { font-size:12px; color:var(--muted); }
    .badge { display:inline-block; font-size:11px; font-weight:700; padding:2px 9px; border-radius:999px; background:var(--warn-bg); color:var(--warn); }
    select, input[type="checkbox"] { font-family:inherit; }
    select { font-size:13px; padding:6px 8px; border:1px solid var(--line); border-radius:8px; background:var(--field); }
    .btn { font-family:inherit; font-size:12.5px; font-weight:600; border-radius:8px; padding:7px 12px; cursor:pointer; border:1px solid var(--accent); }
    .btn.primary { background:var(--accent); color:#fff; } .btn.primary:hover { background:var(--accent-dk); }
    .btn.ghost { background:transparent; color:var(--accent); }
    .msg { margin-top:16px; font-size:13px; color:var(--accent-dk); min-height:18px; }
    #gate { position:fixed; inset:0; z-index:9999; background:var(--bg); display:flex; align-items:center; justify-content:center; text-align:center; padding:24px; }
    #gate p { font-family:'Gowun Batang',serif; font-size:20px; }
    /* ── 공통 NAV ── */
  .ssbon-nav{background:#fff;border-bottom:1px solid #e3e8e3;position:sticky;top:0;z-index:100;}
  .ssbon-nav-inner{max-width:1400px;margin:0 auto;padding:0 20px;height:52px;display:flex;align-items:center;}
  .ssbon-nav-brand{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:700;color:#1d2620;white-space:nowrap;margin-right:24px;text-decoration:none;}
  .ssbon-nav-dot{width:8px;height:8px;border-radius:50%;background:#2f7d4f;display:inline-block;flex-shrink:0;}
  .ssbon-nav-links{display:flex;gap:2px;flex:1;}
  .ssbon-nav-links a{text-decoration:none;font-size:13px;font-weight:600;color:#6b7770;padding:6px 12px;border-radius:8px;transition:.12s;white-space:nowrap;}
  .ssbon-nav-links a:hover{background:#f0f3f0;color:#1d2620;}
  .ssbon-nav-links a.active{background:#e7f2ec;color:#2f7d4f;}
  .ssbon-nav-right{margin-left:auto;display:flex;align-items:center;gap:8px;padding-left:16px;}
  .ssbon-who{font-size:12px;color:#6b7770;white-space:nowrap;}
  .ssbon-role{background:#e7f2ec;color:#2f7d4f;padding:2px 8px;border-radius:999px;font-size:11px;font-weight:700;}
  .ssbon-nav-btn{font-family:inherit;font-size:12px;font-weight:600;padding:5px 12px;border-radius:8px;cursor:pointer;color:#2f7d4f;background:#fff;border:1px solid #e3e8e3;}
  .ssbon-nav-btn:hover{background:#f0f3f0;}
  .ssbon-nav-btn.primary{color:#fff;background:#2f7d4f;border-color:#2f7d4f;}
  .ssbon-nav-btn.primary:hover{background:#266a42;}
  </style>
</head>
<body>
<nav class="ssbon-nav">
  <div class="ssbon-nav-inner">
    <a class="ssbon-nav-brand" href="simulator.html"><span class="ssbon-nav-dot"></span>순수본 가격도구</a>
    <div class="ssbon-nav-links">
      <a href="simulator.html" data-nav="simulator.html">가격 시뮬레이터</a>
      <a href="pricing.html" data-nav="pricing.html">가격정책</a>
      <a href="products.html" data-nav="products.html">상품 마스터</a>
      <a href="channels.html" data-nav="channels.html">채널 마스터</a>
      <a href="freight.html" data-nav="freight.html">운반비 마스터</a>
    </div>
    <div class="ssbon-nav-right">
      <span class="ssbon-who" id="nav-who"></span>
      <span class="ssbon-role" id="nav-role" style="display:none;"></span>
      <button class="ssbon-nav-btn primary" id="nav-admin-btn" style="display:none;" onclick="location.href='admin.html'">사용자 관리</button>
      <button class="ssbon-nav-btn" id="nav-logout-btn" style="display:none;">로그아웃</button>
    </div>
  </div>
</nav>
<script>
(function(){
  var p=location.pathname.split('/').pop()||'index.html';
  document.querySelectorAll('.ssbon-nav-links a[data-nav]').forEach(function(a){
    if(a.getAttribute('data-nav')===p) a.classList.add('active');
  });
})();
</script>
  <div id="gate"><p>확인 중...</p></div>

  <div class="wrap">
    <div class="topbar">
      <div>
        <p class="eyebrow">순수본 · 식품본부 · 관리자</p>
        <h1>사용자 관리</h1>
      </div>
      <a class="link" href="./simulator.html">← 시뮬레이터로</a>
    </div>

    <div class="panel">
      <table>
        <thead>
          <tr><th>사용자</th><th>가입일</th><th>역할</th><th>활성</th><th>동작</th></tr>
        </thead>
        <tbody id="rows"></tbody>
      </table>
    </div>
    <p class="msg" id="msg"></p>
  </div>

  <script>
    const sb = window.supabase.createClient(
      "https://ngvgzfhvjaowwhnmmpex.supabase.co",
      "sb_publishable_Mxqz7HBIPJNp0UQUgjsmiA_lHSfCh-A"
    );

  function initNav(user) {
    var who = document.getElementById('nav-who');
    var role = document.getElementById('nav-role');
    var adminBtn = document.getElementById('nav-admin-btn');
    var logoutBtn = document.getElementById('nav-logout-btn');
    if(who) who.textContent = (user.name||user.email||'');
    if(role){ role.textContent = user.role||''; role.style.display='inline'; }
    if(adminBtn) adminBtn.style.display = (user.role==='admin')?'inline-block':'none';
    if(logoutBtn){
      logoutBtn.style.display='inline-block';
      logoutBtn.onclick = async function(){ await sb.auth.signOut(); location.href='index.html'; };
    }
  }
    const ROLES = ['pending','user','master','admin'];
    let users = [];

    function showMsg(t){ document.getElementById('msg').textContent = t; }
    function fmtDate(s){ return s ? new Date(s).toLocaleDateString('ko-KR') : '-'; }

    // 목록 그리기
    function renderRows(){
      document.getElementById('rows').innerHTML = users.map((u, i) => {
        const pending = (u.role === 'pending');
        const roleOpts = ROLES.map(r => '<option value="'+r+'"'+(r===u.role?' selected':'')+'>'+r+'</option>').join('');
        return '<tr>' +
          '<td><input type="text" id="name-'+i+'" value="'+ (u.name ? u.name.replace(/"/g,'&quot;') : '') +'" placeholder="이름 입력" style="width:130px;padding:5px 8px;border:1px solid #d8e0d8;border-radius:6px;font-size:14px;font-family:inherit;" /><div class="sub" style="margin-top:3px;">'+ u.email + (pending ? ' <span class="badge">승인대기</span>' : '') +'</div></td>' +
          '<td>'+ fmtDate(u.created_at) +'</td>' +
          '<td><select id="role-'+i+'">'+ roleOpts +'</select></td>' +
          '<td style="text-align:center;"><input type="checkbox" id="active-'+i+'"'+(u.is_active?' checked':'')+' /></td>' +
          '<td>' +
            (pending ? '<button class="btn primary" onclick="approve('+i+')">승인</button> ' : '') +
            '<button class="btn ghost" onclick="saveRow('+i+')">저장</button>' +
          '</td>' +
        '</tr>';
      }).join('');
    }

    // 한 사용자 저장 (역할 + 활성)
    async function update(i, role, isActive, name){
      const u = users[i];
      const patch = { role: role, is_active: isActive, updated_at: new Date().toISOString() };
      if (name !== undefined) patch.name = name;
      const { error } = await sb.from('users')
        .update(patch)
        .eq('id', u.id);
      if (error){ showMsg('저장 실패: ' + error.message); return false; }
      u.role = role; u.is_active = isActive;
      if (name !== undefined) u.name = name;
      showMsg('"' + (u.name || u.email) + '" 저장됨 (역할: ' + role + ', 활성: ' + (isActive?'O':'X') + ')');
      renderRows();
      return true;
    }
    window.saveRow = function(i){
      const role = document.getElementById('role-'+i).value;
      const isActive = document.getElementById('active-'+i).checked;
      const name = document.getElementById('name-'+i).value.trim();
      update(i, role, isActive, name);
    };
    window.approve = function(i){ const nameEl=document.getElementById('name-'+i); const name=nameEl?nameEl.value.trim():undefined; update(i, 'user', true, name); };   // 승인 = user + 활성 (+이름)

    // 목록 불러오기
    async function loadUsers(){
      const { data, error } = await sb.from('users').select('*').order('created_at', { ascending: true });
      if (error){ showMsg('불러오기 실패: ' + error.message); return; }
      users = data || [];
      renderRows();
    }

    // 관리자 확인 게이트
    (async function guard(){
      const { data: { session } } = await sb.auth.getSession();
      if (!session){ window.location.href = './index.html'; return; }
      let p = null;
      try { const r = await sb.from('users').select('*').eq('id', session.user.id).single(); p = r.data; } catch(e){}
      if (p && p.role === 'admin'){
        document.getElementById('gate').style.display = 'none';
        initNav(p);
        loadUsers();
      } else {
        document.getElementById('gate').innerHTML = '<div><p>관리자 전용 페이지입니다</p><p style="font-size:13px;color:#8a8073;margin-top:8px;"><a href="./simulator.html" style="color:#3f6b46;">시뮬레이터로 돌아가기</a></p></div>';
      }
    })();
  </script>
</body>
</html>
