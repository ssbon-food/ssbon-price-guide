<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>가격정책 · 순수본 식품본부</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --bg:#f4f6f3; --panel:#fff; --ink:#1d2620; --muted:#6b7770; --line:#e3e8e3;
      --accent:#2f7d4f; --accent-soft:#e7f2ec; --warn:#b4441f;
      --good:#2f7d4f; --good-bg:#e7f2ec;
      --caution:#9a7b1f; --caution-bg:#f6efd8;
      --bad:#b4452f; --bad-bg:#f6e2dc;
      --radius:12px; --shadow:0 1px 2px rgba(20,40,30,.05),0 8px 24px rgba(20,40,30,.06);
      --fix-w: 680px; /* 고정 영역: 상품/입수량 + 원가 + 가격(정상/상시/최대) */
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:"Pretendard",-apple-system,"Malgun Gothic",sans-serif;background:var(--bg);color:var(--ink);font-size:14px;line-height:1.5;}

    .ssbon-nav{background:#fff;border-bottom:1px solid #e3e8e3;}
    .ssbon-nav-inner{max-width:1400px;margin:0 auto;padding:0 18px;min-height:48px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
    .ssbon-nav-brand{display:flex;align-items:center;gap:7px;font-size:13px;font-weight:700;color:#1d2620;white-space:nowrap;}
    .ssbon-nav-dot{width:8px;height:8px;border-radius:50%;background:#2f7d4f;display:inline-block;}
    .ssbon-nav-links{display:flex;gap:4px;flex:1;}
    .ssbon-nav-links a{text-decoration:none;font-size:13px;font-weight:600;color:#6b7770;padding:6px 11px;border-radius:8px;transition:.12s;}
    .ssbon-nav-links a:hover{background:#f0f3f0;color:#1d2620;}
    .ssbon-nav-links a.active{background:#e7f2ec;color:#2f7d4f;}
    .ssbon-nav-right{margin-left:auto;display:flex;align-items:center;gap:8px;}
    .ssbon-nav-btn{font-family:inherit;font-size:12px;font-weight:600;padding:6px 12px;border-radius:8px;cursor:pointer;color:#2f7d4f;background:#fff;border:1px solid #e3e8e3;}
    .ssbon-nav-btn.primary{color:#fff;background:#2f7d4f;border-color:#2f7d4f;}
    .who-info{font-size:12px;color:#6b7770;}

    .page-wrap{max-width:1400px;margin:0 auto;padding:14px 18px 60px;}

    .filter-bar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:14px;background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:12px 16px;box-shadow:var(--shadow);}
    .filter-bar label{font-size:12px;font-weight:600;color:var(--muted);white-space:nowrap;}
    .filter-bar select{font-family:inherit;font-size:13px;padding:6px 10px;border:1px solid var(--line);border-radius:8px;background:#fafbfa;color:var(--ink);max-width:130px;}
    .filter-bar .filter-input{font-family:inherit;font-size:13px;padding:6px 10px;border:1px solid var(--line);border-radius:8px;background:#fafbfa;color:var(--ink);min-width:180px;}
    .filter-bar .filter-input:focus{outline:none;border-color:var(--accent);background:#fff;}
    .filter-bar select:focus{outline:none;border-color:var(--accent);}
    .filter-sep{color:var(--line);font-size:18px;}
    .filter-bar .spacer{flex:1;}
    .badge-sm{font-size:11px;font-weight:600;padding:2px 8px;border-radius:10px;}
    .badge-sm.good{background:var(--good-bg);color:var(--good);}
    .badge-sm.caution{background:var(--caution-bg);color:var(--caution);}
    .badge-sm.bad{background:var(--bad-bg);color:var(--bad);}

    /* 분리 테이블 레이아웃 */
    .table-outer{display:flex;border:1px solid var(--line);border-radius:var(--radius);background:var(--panel);box-shadow:var(--shadow);overflow:hidden;}

    /* 왼쪽 고정 테이블 */
    .table-fixed{flex:0 0 var(--fix-w);width:var(--fix-w);overflow:hidden;border-right:2px solid #aacfbb;z-index:2;background:var(--panel);}
    .table-fixed table{width:var(--fix-w);table-layout:auto;border-collapse:collapse;font-size:12.5px;}

    /* 오른쪽 스크롤 테이블 */
    .table-scroll{flex:1;overflow-x:auto;overflow-y:hidden;}
    .table-scroll table{border-collapse:collapse;font-size:12.5px;white-space:nowrap;}

    /* 공통 th/td */
    .tbl th{padding:7px 7px;font-size:11px;color:var(--muted);font-weight:600;border-bottom:1px solid var(--line);border-right:1px solid var(--line);background:#fafbfa;text-align:center;white-space:nowrap;}
    .tbl td{padding:6px 7px;border-bottom:1px solid var(--line);border-right:1px solid var(--line);text-align:right;vertical-align:middle;white-space:nowrap;height:36px;}
    .tbl th:last-child,.tbl td:last-child{border-right:none;}
    .tbl th.left{text-align:left;}
    .tbl td.left{text-align:left;}
    .tbl td.center{text-align:center;}
    .tbl tr.product-header td{background:#f0f7f2;font-weight:700;font-size:13px;color:var(--ink);border-bottom:1px solid #c8e6d0;}
    .tbl tr.no-data td{color:var(--muted);font-style:italic;text-align:left;}
    .tbl tr:hover td{background:#f7faf8;}
    .tbl tr.product-header:hover td{background:#e8f4ec;}
    .tbl th.group{background:#f0f3f0;font-size:11.5px;color:var(--ink);}

    .bdg{display:inline-block;padding:2px 7px;border-radius:14px;font-size:11px;font-weight:600;}
    .bdg.good{background:var(--good-bg);color:var(--good);}
    .bdg.caution{background:var(--caution-bg);color:var(--caution);}
    .bdg.bad{background:var(--bad-bg);color:var(--bad);}
    .loading{padding:60px 20px;text-align:center;color:var(--muted);}
    .empty-row{padding:40px 20px;text-align:center;color:var(--muted);}

    button{font-family:inherit;cursor:pointer;border:none;border-radius:8px;font-size:13px;font-weight:600;padding:8px 14px;transition:.12s;}
    .btn-primary{background:var(--accent);color:#fff;}
    .btn-ghost{background:#fff;color:var(--ink);border:1px solid var(--line);}

    #authGate{position:fixed;inset:0;z-index:9999;background:var(--bg);display:flex;align-items:center;justify-content:center;text-align:center;padding:24px;}
    /* ── 공통 NAV ── */
  .ssbon-nav{background:#fff;border-bottom:1px solid #e3e8e3;position:sticky;top:0;z-index:100;}
  .ssbon-nav-inner{max-width:1400px;margin:0 auto;padding:0 20px;height:52px;display:flex;align-items:center;}
  .ssbon-nav-brand{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:700;color:#1d2620;white-space:nowrap;margin-right:24px;text-decoration:none;}
  .ssbon-nav-dot{width:8px;height:8px;border-radius:50%;background:#2f7d4f;display:inline-block;flex-shrink:0;}
  .ssbon-nav-links{display:flex;gap:2px;flex:1;}
  .ssbon-nav-links a{text-decoration:none;font-size:13px;font-weight:600;color:#6b7770;padding:6px 12px;border-radius:8px;transition:.12s;white-space:nowrap;}
  .ssbon-nav-links a:hover{background:#f0f3f0;color:#1d2620;}
  .ssbon-nav-links a.active{background:#e7f2ec;color:#2f7d4f;}
  .ssbon-nav-right{margin-left:auto;display:flex;align-items:center;gap:8px;padding-left:16px;}
  .ssbon-who{font-size:12px;color:#6b7770;white-space:nowrap;}
  .ssbon-role{background:#e7f2ec;color:#2f7d4f;padding:2px 8px;border-radius:999px;font-size:11px;font-weight:700;}
  .ssbon-nav-btn{font-family:inherit;font-size:12px;font-weight:600;padding:5px 12px;border-radius:8px;cursor:pointer;color:#2f7d4f;background:#fff;border:1px solid #e3e8e3;}
  .ssbon-nav-btn:hover{background:#f0f3f0;}
  .ssbon-nav-btn.primary{color:#fff;background:#2f7d4f;border-color:#2f7d4f;}
  .ssbon-nav-btn.primary:hover{background:#266a42;}

    /* 가격 그룹 컬러 */
    .tbl th.grp-n{background:#f0f7f2;color:#2f7d4f;}
    .tbl th.grp-a{background:#f0f4f9;color:#1a5fa8;}
    .tbl th.grp-m{background:#fdf0f0;color:#b4452f;}
    .tbl td.grp-n{background:#fafdf9;}
    .tbl td.grp-a{background:#f7f9fd;}
    .tbl td.grp-m{background:#fdf9f9;}
    .tbl td.grp-a:first-of-type{}
    /* 모달 */
    .modal-overlay{position:fixed;inset:0;z-index:9998;background:rgba(20,30,25,.45);display:none;align-items:center;justify-content:center;padding:20px;}
    .modal-overlay.show{display:flex;}
    .modal-box{background:#fff;border-radius:16px;padding:22px 24px;max-width:380px;width:100%;box-shadow:0 20px 60px -20px rgba(0,0,0,.4);position:relative;max-height:90vh;overflow-y:auto;}
    .modal-close{position:absolute;top:14px;right:14px;background:none;border:none;font-size:16px;color:var(--muted);cursor:pointer;padding:4px 8px;border-radius:6px;}
    .modal-close:hover{background:#f0f3f0;}
    .md-head{font-size:14px;font-weight:700;color:var(--ink);margin-bottom:4px;}
    .md-dist{background:#f0f4fb;border-radius:8px;padding:7px 9px;margin-bottom:7px;}
    .md-row{display:grid;grid-template-columns:1fr 46px 46px 70px;gap:0 4px;align-items:center;padding:2.5px 0;font-size:12px;}
    .md-row .mk{color:var(--muted);text-align:left;}
    .md-row .mp1,.md-row .mp2{text-align:right;color:var(--muted);font-variant-numeric:tabular-nums;}
    .md-row .mv{text-align:right;color:var(--ink);font-variant-numeric:tabular-nums;}
    .md-row.b{padding:4px 0;}
    .md-row.b .mk,.md-row.b .mp1,.md-row.b .mp2,.md-row.b .mv{font-weight:700;color:var(--ink);}
    .md-line{height:1px;background:var(--line);margin:5px 0;}
  </style>
</head>

    <p id="gateMsg" style="font-size:18px;font-weight:700;color:var(--ink);">로그인 확인 중...</p>

<div id="app" style="display:none;">

    <!-- 필터 바 (검색형) -->

<script>
  const SB_URL = "https://ngvgzfhvjaowwhnmmpex.supabase.co";
  const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5ndmd6Zmh2amFvd3dobm1tcGV4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAwMzgyNjQsImV4cCI6MjA5NTYxNDI2NH0.jO5Ab8trHPyamHhYFXi9UWvQ217pDJW9qplBWph8cgg";
  const sb = window.supabase.createClient(SB_URL, SB_KEY);
  function initNav(user) {
    var who = document.getElementById('nav-who');
    var role = document.getElementById('nav-role');
    var adminBtn = document.getElementById('nav-admin-btn');
    var logoutBtn = document.getElementById('nav-logout-btn');
    if(who) who.textContent = (user.name||user.email||'');
    if(role){ role.textContent = user.role||''; role.style.display='inline'; }
    if(adminBtn) adminBtn.style.display = (user.role==='admin')?'inline-block':'none';
    if(logoutBtn){
      logoutBtn.style.display='inline-block';
      logoutBtn.onclick = async function(){ await sb.auth.signOut(); location.href='index.html'; };
    }
  }

  let me = null;
  let allProducts = [], allChannels = [], allUnits = [], allLogistics = [], allFreight = [], allLinks = [];
  let freightMap = {}; // temperature => consign_freight
  let logisticsMap = {}; // channel_id+temperature => {freight_rate, dist_rate}
  let linkSet = new Set(); // "unit_id_channel_id" 연결 집합

  const $ = id => document.getElementById(id);
  const comma = n => Number(Math.round(n)||0).toLocaleString('ko-KR');
  const pct = n => n.toFixed(1)+'%';
  const won = n => comma(n)+'원';
  $('gateBtn').addEventListener('click',   async()=>{ await sb.auth.signOut(); location.href='./index.html'; });

  (async function guard(){
    const { data:{ session } } = await sb.auth.getSession();
    if (!session){ location.href='./index.html'; return; }
    let p = null;
    try { const r = await sb.from('users').select('*').eq('id',session.user.id).single(); p=r.data; } catch(e){}
    if (p && p.is_active && p.role!=='pending'){
      me = p;
      $('authGate').style.display='none'; $('app').style.display='block';
      initNav(p);
      await loadAll();
    } else {
      $('gateMsg').textContent='승인 대기 중입니다';
      $('gateSub').textContent='관리자 승인 후 이용 가능합니다.';
      $('gateBtn').style.display='inline-block';
    }
  })();

  async function loadAll(){
    try { const r=await sb.from('products').select('*').eq('is_active',true).order('code'); allProducts=r.data||[]; } catch(e){ allProducts=[]; }
    try { const r=await sb.from('channels').select('*').eq('is_active',true).order('name'); allChannels=r.data||[]; } catch(e){ allChannels=[]; }
    try { const r=await sb.from('product_units').select('*').eq('is_active',true).order('box_qty'); allUnits=r.data||[]; } catch(e){ allUnits=[]; }
    try { const r=await sb.from('logistics').select('*').eq('is_active',true); allFreight=r.data||[]; } catch(e){ allFreight=[]; }
    try { const r=await sb.from('channel_logistics').select('*'); allLogistics=r.data||[]; } catch(e){ allLogistics=[]; }
    try { const r=await sb.from('unit_channels').select('*'); allLinks=r.data||[]; } catch(e){ allLinks=[]; }

    freightMap = {}; logisticsMap = {}; linkSet = new Set();
    allFreight.forEach(f=>{ freightMap[f.temperature] = f.consign_freight||0; });
    allLogistics.forEach(l=>{ logisticsMap[`${l.channel_id}_${l.temperature}`] = l; });
    allLinks.forEach(l=>{ linkSet.add(`${l.unit_id}_${l.channel_id}`); });

    // 새 컬럼 필터 옵션 로드 (product_options, 순서 반영)
    let optRows = [];
    try { const r=await sb.from('product_options').select('*').order('sort_order',{ascending:true}); optRows=r.data||[]; } catch(e){ optRows=[]; }
    const optMap = { customer:[], make_type:[], manage_type:[], item_type:[] };
    optRows.forEach(o=>{ if(optMap[o.field]) optMap[o.field].push(o.value); });
    // 옵션에 없지만 상품에 실제로 쓰인 값도 보강 (누락 방지)
    ['customer','make_type','manage_type','item_type'].forEach(f=>{
      allProducts.forEach(p=>{ const v=p[f]; if(v && !optMap[f].includes(v)) optMap[f].push(v); });
      const sel = $('filter-'+f);
      if(sel){
        sel.innerHTML = '<option value="">전체</option>' + optMap[f].map(v=>`<option value="${esc(v)}">${esc(v)}</option>`).join('');
      }
    });

    renderTable();
  }

  // 필터 이벤트 (검색형 input + 채널유형 select)
  // 타이핑이 멈춘 뒤에만 렌더 (대량 데이터 버벅임 방지)
  let _debounce=null;
  function renderTableDebounced(){ clearTimeout(_debounce); _debounce=setTimeout(renderTable, 250); }
  ['filter-product','filter-channel'].forEach(id=>{ $(id) && $(id).addEventListener('input', renderTableDebounced); });
  $('filter-chtype') && $('filter-chtype').addEventListener('change', renderTable);
  ['filter-customer','filter-make_type','filter-manage_type','filter-item_type'].forEach(id=>{ $(id) && $(id).addEventListener('change', ()=>{ syncAttrFilters(); renderTable(); }); });

  // 필터 연동: 한 필터를 고르면 나머지는 양립하는 상품에 존재하는 값만 표시
  function syncAttrFilters(){
    const fields = ['customer','make_type','manage_type','item_type'];
    const cur = {};
    fields.forEach(f=>{ cur[f] = $('filter-'+f).value; });
    fields.forEach(f=>{
      const pool = allProducts.filter(p=> fields.every(g=> g===f || !cur[g] || p[g]===cur[g]));
      const vals = [];
      pool.forEach(p=>{ const v=p[f]; if(v && !vals.includes(v)) vals.push(v); });
      vals.sort((a,b)=>a.localeCompare(b,'ko'));
      const sel = $('filter-'+f);
      const keep = cur[f];
      sel.innerHTML = ['<option value="">전체</option>'].concat(vals.map(v=>`<option value="${esc(v)}">${esc(v)}</option>`)).join('');
      sel.value = vals.includes(keep) ? keep : '';
    });
  }

  // ── 손익 계산 (시뮬레이터와 동일: 직납 case1/case2) ──
  // price=이 가격대, normalP=정상가(직납 기준점), 상세값 모두 반환
  function calcProfit(price, boxQty, product, channel, normalP){
    if (!price) return null;
    const vatEx   = price/1.1;
    const isDirect= channel.channel_type==='direct';
    const temp    = product.temperature;
    const lData   = logisticsMap[`${channel.id}_${temp}`] || {freight_rate:0, dist_rate:0};
    const cost    = (product.unit_cost||0) * boxQty;
    const adVal   = channel.ad_value||0;
    const promoVal= channel.promotion_value||0;
    const hqVal   = channel.hq_value||0;
    const divVal  = channel.div_value||0;

    if (isDirect){
      const distRate  = lData.dist_rate||0;
      const dType     = channel.discount_type || 'case1';
      const normVatEx = (normalP||price)/1.1;
      const discVatEx = vatEx;
      const baseVatEx = (dType==='case2') ? discVatEx : normVatEx;
      const distProfit= baseVatEx*(distRate/100);
      const supply    = baseVatEx - distProfit;
      const fee   = supply*((channel.commission_rate||0)/100);
      const ad    = channel.ad_type==='fixed' ? adVal : supply*(adVal/100);
      const promo = channel.promotion_type==='fixed' ? promoVal : supply*(promoVal/100);
      const freight = supply*((lData.freight_rate||0)/100);
      const hq    = channel.hq_type==='fixed' ? hqVal : supply*(hqVal/100);
      const div   = channel.div_type==='fixed' ? divVal : supply*(divVal/100);
      const discShare = (dType==='case1') ? (normVatEx - discVatEx) : 0;
      const opProfit = supply - cost - discShare - fee - ad - promo - freight - hq - div;
      const opRate   = supply>0 ? opProfit/supply*100 : 0;
      return { price, vatEx:discVatEx, normVatEx, distRate, distProfit, supply, cost, fee, ad, promo, freight, hq, div, discShare, dType, opProfit, opRate, isDirect:true };
    } else {
      const supply = vatEx;
      const feeBase= channel.commission_base==='vat' ? price : supply;
      const fee    = feeBase * ((channel.commission_rate||0)/100);
      const ad     = channel.ad_type==='fixed' ? adVal : supply*(adVal/100);
      const promo  = channel.promotion_type==='fixed' ? promoVal : supply*(promoVal/100);
      const _cap = product && product.box_capacity ? Number(product.box_capacity) : 0;
      const _nBox = (_cap>0) ? Math.max(1, Math.ceil(boxQty/_cap)) : 1;
      const freight= (freightMap[temp]||0) * _nBox;
      const hq     = channel.hq_type==='fixed' ? hqVal : supply*(hqVal/100);
      const div    = channel.div_type==='fixed' ? divVal : supply*(divVal/100);
      const opProfit = supply-cost-fee-ad-promo-freight-hq-div;
      const opRate   = supply>0 ? opProfit/supply*100 : 0;
      return { price, vatEx, distRate:0, distProfit:0, supply, cost, fee, ad, promo, freight, hq, div, discShare:0, opProfit, opRate, isDirect:false };
    }
  }

  function badge(rate){
    if(rate===null||isNaN(rate)) return '-';
    const cls = rate>=20?'good':rate>=10?'caution':'bad';
    return `<span class="bdg ${cls}">${pct(rate)}</span>`;
  }

  // 입수량이 채널에 연결됐는지
  function isLinked(unitId, channelId){ return linkSet.has(`${unitId}_${channelId}`); }

  function renderTable(){
    const qProd = ($('filter-product').value||'').trim().toLowerCase();
    const qChan = ($('filter-channel').value||'').trim().toLowerCase();
    const selType= $('filter-chtype').value;
    const fCustomer = $('filter-customer').value;
    const fMakeType = $('filter-make_type').value;
    const fManageType = $('filter-manage_type').value;
    const fItemType = $('filter-item_type').value;
    const anyAttrFilter = fCustomer||fMakeType||fManageType||fItemType;

    const fixedDiv  = $('table-fixed');
    const scrollDiv = $('table-scroll');
    const MAX_ROWS = 50;  // 한 번에 그릴 최대 상품 수

    // 필터를 하나도 안 걸었으면 전체를 그리지 않음 (대량 렌더 방지)
    if(!qProd && !qChan && !selType && !anyAttrFilter){
      fixedDiv.innerHTML = '<div class="empty-row" style="padding:50px 24px;line-height:1.8;">'
        + '<div style="font-size:15px;font-weight:600;color:var(--ink);margin-bottom:6px;">검색해서 시작하세요</div>'
        + '<div style="font-size:13px;color:var(--muted);">상품명·ERP코드 입력, 고객/제·상품/관리유형/품목유형 선택,<br>또는 채널유형/판매처를 선택하면 해당하는 가격정책만 빠르게 표시됩니다.</div>'
        + `<div style="font-size:12px;color:var(--muted);margin-top:12px;">전체 상품 ${allProducts.length}개 · 채널 ${allChannels.length}개</div>`
        + '</div>';
      scrollDiv.innerHTML = '';
      return;
    }

    // 상품 필터 (코드/이름 검색)
    let products = allProducts.filter(p=>{
      if(qProd && !(`${p.code||''} ${p.name||''}`).toLowerCase().includes(qProd)) return false;
      if(fCustomer   && p.customer!==fCustomer) return false;
      if(fMakeType   && p.make_type!==fMakeType) return false;
      if(fManageType && p.manage_type!==fManageType) return false;
      if(fItemType   && p.item_type!==fItemType) return false;
      return true;
    });
    // 채널 필터 (유형 + 이름 검색)
    const channels = allChannels.filter(c=>{
      if(selType && c.channel_type!==selType) return false;
      if(qChan && !(`${c.name||''}`).toLowerCase().includes(qChan)) return false;
      return true;
    });

    if(products.length===0){
      fixedDiv.innerHTML  = '<div class="empty-row" style="padding:40px 20px;">표시할 상품이 없습니다</div>';
      scrollDiv.innerHTML = '';
      return;
    }

    // 결과가 너무 많으면 상위 MAX_ROWS개만 (나머지는 검색으로 좁히도록 안내)
    let truncated = false;
    if(products.length > MAX_ROWS){
      truncated = true;
      products = products.slice(0, MAX_ROWS);
    }

    const unitsMap = {};
    allUnits.forEach(u=>{ if(!unitsMap[u.product_id]) unitsMap[u.product_id]=[]; unitsMap[u.product_id].push(u); });

    // ════════════════════════════════════════════
    // 왼쪽 고정: 상품/입수량 + 원가 + [가격 공통영역: 정상/상시/최대]
    //   - 정상판매가: 판매가, 개당가
    //   - 상시할인가: 할인율, 판매가, 개당가
    //   - 최대할인가: 할인율, 판매가, 개당가
    // ════════════════════════════════════════════
    let fHtml = `<table class="tbl" style="table-layout:auto;">
      <thead>
        <tr>
          <th class="left" rowspan="2" style="vertical-align:middle;min-width:150px;">상품 / 입수량</th>
          <th rowspan="2" style="vertical-align:middle;min-width:64px;">원가</th>
          <th colspan="2" class="grp-n">정상판매가</th>
          <th colspan="3" class="grp-a">상시할인가</th>
          <th colspan="3" class="grp-m">최대할인가</th>
        </tr>
        <tr>
          <th class="grp-n">판매가</th><th class="grp-n">개당가</th>
          <th class="grp-a">할인율</th><th class="grp-a">판매가</th><th class="grp-a">개당가</th>
          <th class="grp-m">할인율</th><th class="grp-m">판매가</th><th class="grp-m">개당가</th>
        </tr>
      </thead><tbody>`;

    // ════════════════════════════════════════════
    // 오른쪽 스크롤: 채널별 이익률 (정상/상시/최대 3열)
    // ════════════════════════════════════════════
    let sHtml = `<table class="tbl"><thead>
      <tr>`;
    channels.forEach(c=>{
      sHtml += `<th colspan="3" class="group" style="border-left:2px solid var(--line);">${esc(c.name)} <span style="font-weight:400;font-size:11px;color:var(--muted);">${c.channel_type==='direct'?'직납':'위탁'}</span></th>`;
    });
    sHtml += `</tr><tr>`;
    channels.forEach(()=>{
      sHtml += `<th style="border-left:2px solid var(--line);background:#f0f7f2;font-size:10.5px;color:#2f7d4f;">정상</th>`;
      sHtml += `<th style="background:#f0f4f9;font-size:10.5px;color:#1a5fa8;">상시</th>`;
      sHtml += `<th style="background:#fdf0f0;font-size:10.5px;color:#b4452f;">최대</th>`;
    });
    sHtml += `</tr></thead><tbody>`;

    products.forEach(prod=>{
      const units = (unitsMap[prod.id]||[]).sort((a,b)=>a.box_qty-b.box_qty);

      // 상품 헤더행 (고정 + 스크롤)
      fHtml += `<tr class="product-header"><td class="left" colspan="11" style="border-right:none;"><strong>${esc(prod.code||'')} ${esc(prod.name)}</strong> <span style="font-weight:400;color:var(--muted);font-size:11px;">(${esc(prod.temperature||'')})</span></td></tr>`;
      sHtml += `<tr class="product-header">`;
      channels.forEach(()=>{ sHtml += `<td colspan="3" style="border-left:2px solid var(--line);"></td>`; });
      sHtml += `</tr>`;

      if(units.length===0){
        fHtml += `<tr class="no-data"><td class="left" style="padding-left:16px;color:var(--muted);" colspan="11">가격정책 미등록</td></tr>`;
        sHtml += `<tr class="no-data">`;
        channels.forEach(()=>{ sHtml += `<td colspan="3" style="border-left:2px solid var(--line);text-align:center;color:var(--muted);">-</td>`; });
        sHtml += `</tr>`;
        return;
      }

      units.forEach(unit=>{
        const qty = unit.box_qty;
        const np = unit.normal_price||0, ap = unit.always_price||0, mp = unit.max_price||0;
        const eaNp = qty>0 ? Math.round(np/qty) : 0;
        const eaAp = qty>0 && ap>0 ? Math.round(ap/qty) : 0;
        const eaMp = qty>0 && mp>0 ? Math.round(mp/qty) : 0;
        const apDisc = (np>0 && ap>0) ? ((np-ap)/np*100) : null;
        const mpDisc = (np>0 && mp>0) ? ((np-mp)/np*100) : null;

        // 고정 테이블 행: 가격 공통
        fHtml += `<tr>
          <td class="left" style="padding-left:16px;">${qty}개입</td>
          <td style="color:var(--muted);font-size:11px;">${comma((prod.unit_cost||0)*qty)}</td>
          <td class="grp-n">${np?comma(np):'-'}</td>
          <td class="grp-n" style="color:var(--muted);">${eaNp?comma(eaNp):'-'}</td>
          <td class="grp-a" style="color:#1a5fa8;font-size:11px;">${apDisc!=null?'↓'+apDisc.toFixed(1)+'%':'-'}</td>
          <td class="grp-a">${ap?comma(ap):'-'}</td>
          <td class="grp-a" style="color:var(--muted);">${eaAp?comma(eaAp):'-'}</td>
          <td class="grp-m" style="color:#b4452f;font-size:11px;">${mpDisc!=null?'↓'+mpDisc.toFixed(1)+'%':'-'}</td>
          <td class="grp-m">${mp?comma(mp):'-'}</td>
          <td class="grp-m" style="color:var(--muted);">${eaMp?comma(eaMp):'-'}</td>
        </tr>`;

        // 스크롤 테이블 행: 채널별 이익률 (연결 안된 채널은 -)
        sHtml += `<tr>`;
        channels.forEach(ch=>{
          const linked = isLinked(unit.id, ch.id);
          if(!linked){
            sHtml += `<td colspan="3" style="border-left:2px solid var(--line);text-align:center;color:#cfcfcf;">미판매</td>`;
            return;
          }
          const rn = calcProfit(np, qty, prod, ch, np);
          const ra = calcProfit(ap, qty, prod, ch, np);
          const rm = calcProfit(mp, qty, prod, ch, np);
          const cell = (r, kind, bg, leftBorder) => {
            const lb = leftBorder ? 'border-left:2px solid var(--line);' : '';
            if(!r) return `<td style="${lb}background:${bg};text-align:center;color:var(--muted);">-</td>`;
            return `<td class="rate-cell" data-uid="${unit.id}" data-cid="${ch.id}" data-kind="${kind}" style="${lb}background:${bg};cursor:pointer;text-align:center;">${badge(r.opRate)}</td>`;
          };
          sHtml += cell(rn, 'np', '#fafdf9', true);
          sHtml += cell(ra, 'ap', '#f7f9fd', false);
          sHtml += cell(rm, 'mp', '#fdf9f9', false);
        });
        sHtml += `</tr>`;
      });
    });

    fHtml += `</tbody></table>`;
    sHtml += `</tbody></table>`;
    if(truncated){
      fHtml += `<div style="padding:12px 16px;font-size:12px;color:var(--warn);background:#fef9f2;border-top:1px solid var(--line);">상위 ${products.length}개만 표시했습니다. 검색어를 더 입력해 결과를 좁혀주세요.</div>`;
    }
    fixedDiv.innerHTML  = fHtml;
    scrollDiv.innerHTML = sHtml;

    // 이익률 셀 클릭 → 상세손익 모달
    scrollDiv.querySelectorAll('.rate-cell').forEach(td=>{
      td.addEventListener('click', ()=>{
        const uid=+td.dataset.uid, cid=+td.dataset.cid, kind=td.dataset.kind;
        openDetailModal(uid, cid, kind);
      });
    });

    syncRowHeights();
  }

  function syncRowHeights(){
    const fRows = $('table-fixed').querySelectorAll('tr');
    const sRows = $('table-scroll').querySelectorAll('tr');
    const len = Math.min(fRows.length, sRows.length);
    for(let i=0; i<len; i++){
      fRows[i].style.height = '';
      sRows[i].style.height = '';
      const h = Math.max(fRows[i].offsetHeight, sRows[i].offsetHeight);
      fRows[i].style.height = h+'px';
      sRows[i].style.height = h+'px';
    }
  }

  // ── 상세손익 모달 ──
  function openDetailModal(unitId, channelId, kind){
    const unit = allUnits.find(u=>u.id===unitId);
    const prod = allProducts.find(p=>p.id===unit.product_id);
    const chan = allChannels.find(c=>c.id===channelId);
    if(!unit||!prod||!chan) return;
    const np = unit.normal_price||0;
    const priceMap = { np: unit.normal_price, ap: unit.always_price, mp: unit.max_price };
    const labelMap = { np:'정상판매가', ap:'상시할인가', mp:'최대할인가' };
    const price = priceMap[kind]||0;
    const r = calcProfit(price, unit.box_qty, prod, chan, np);
    if(!r){ return; }

    const sp = r.supply;
    const pp = v => sp>0 ? pct(v/sp*100) : '-';
    const rowHtml = (k,v,opt={})=>{
      const b = opt.bold?'b':'';
      const p1 = opt.p1!=null?opt.p1:'';
      const p2 = opt.p2!=null?opt.p2:'';
      const vs = opt.color?`style="color:${opt.color}"`:'';
      return `<div class="md-row ${b}"><span class="mk">${k}</span><span class="mp1">${p1}</span><span class="mp2">${p2}</span><span class="mv" ${vs}>${v}</span></div>`;
    };
    let h = `<div class="md-head">${labelMap[kind]} ${comma(price)}원</div>`;
    h += `<div style="font-size:12px;color:var(--muted);margin-bottom:8px;">${esc(prod.code||'')} ${esc(prod.name)} · ${unit.box_qty}개입 · ${esc(chan.name)} (${chan.channel_type==='direct'?'직납':'위탁'})</div>`;
    if(r.isDirect){
      const caseLabel = (r.dType==='case2')?'case2 · 할인공급가 기준':'case1 · 정상공급가 기준';
      h += `<div class="md-dist">`;
      h += rowHtml('판매가 (vat포함)', won(r.price), {p1:'110%'});
      h += rowHtml('└ vat별도', won(r.vatEx), {p1:'100%'});
      h += rowHtml('유통사이익', won(r.distProfit), {p1:pct(r.distRate)});
      h += `</div>`;
      h += `<div style="font-size:10px;color:var(--muted);text-align:right;margin:-2px 0 4px;">${caseLabel}</div>`;
      h += rowHtml('= 공급가 (vat별도)', won(r.supply), {bold:true, p1:pct(100-r.distRate), p2:'100%'});
      if(r.dType==='case1' && r.discShare>0){
        h += `<div class="md-line"></div>`;
        h += rowHtml('할인분담금', won(r.discShare), {p2:pp(r.discShare)});
      }
    } else {
      h += rowHtml('판매가 (vat포함)', won(r.price), {p1:'110%'});
      h += rowHtml('공급가 (vat별도)', won(r.supply), {bold:true, p1:'100%'});
    }
    h += `<div class="md-line"></div>`;
    h += rowHtml('상품원가', won(r.cost), {p2:pp(r.cost)});
    h += rowHtml('지급수수료', won(r.fee), {p2:pp(r.fee)});
    h += rowHtml('광고선전비', won(r.ad), {p2:pp(r.ad)});
    h += rowHtml('판매촉진비', won(r.promo), {p2:pp(r.promo)});
    h += rowHtml('운반비', won(r.freight), {p2:pp(r.freight)});
    h += rowHtml('본부공통비', won(r.hq), {p2:pp(r.hq)});
    h += rowHtml('부문공통비', won(r.div), {p2:pp(r.div)});
    h += `<div class="md-line"></div>`;
    const col = r.opRate>=10 ? 'var(--good)' : 'var(--bad)';
    h += rowHtml('영업이익', won(r.opProfit), {bold:true, p2:pct(r.opRate), color:col});

    $('modal-body').innerHTML = h;
    $('detail-modal').classList.add('show');
  }
  function closeDetailModal(){ $('detail-modal').classList.remove('show'); }

  function esc(s){return String(s??"").replace(/[&<>"']/g,ch=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));}
</script>
</body>
</html>
