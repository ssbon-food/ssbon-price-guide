<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>가격정책 · 순수본 식품본부</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --bg:#f4f6f3; --panel:#fff; --ink:#1d2620; --muted:#6b7770; --line:#e3e8e3;
      --accent:#2f7d4f; --accent-soft:#e7f2ec; --warn:#b4441f;
      --good:#2f7d4f; --good-bg:#e7f2ec;
      --caution:#9a7b1f; --caution-bg:#f6efd8;
      --bad:#b4452f; --bad-bg:#f6e2dc;
      --radius:12px; --shadow:0 1px 2px rgba(20,40,30,.05),0 8px 24px rgba(20,40,30,.06);
      --fix-w: 350px; /* 고정 컬럼 총 너비: 상품명220 + 품온50 + 원가80 */
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:"Pretendard",-apple-system,"Malgun Gothic",sans-serif;background:var(--bg);color:var(--ink);font-size:14px;line-height:1.5;}

    
    
    
    
    
    
    
    
    
    
    
    

    .page-wrap{max-width:1400px;margin:0 auto;padding:14px 18px 60px;}

    .filter-bar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:14px;background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:12px 16px;box-shadow:var(--shadow);}
    .filter-bar label{font-size:12px;font-weight:600;color:var(--muted);white-space:nowrap;}
    .filter-bar select{font-family:inherit;font-size:13px;padding:6px 10px;border:1px solid var(--line);border-radius:8px;background:#fafbfa;color:var(--ink);}
    .filter-bar select:focus{outline:none;border-color:var(--accent);}
    .filter-sep{color:var(--line);font-size:18px;}
    .filter-bar .spacer{flex:1;}
    .badge-sm{font-size:11px;font-weight:600;padding:2px 8px;border-radius:10px;}
    .badge-sm.good{background:var(--good-bg);color:var(--good);}
    .badge-sm.caution{background:var(--caution-bg);color:var(--caution);}
    .badge-sm.bad{background:var(--bad-bg);color:var(--bad);}

    /* 분리 테이블 레이아웃 */
    .table-outer{display:flex;border:1px solid var(--line);border-radius:var(--radius);background:var(--panel);box-shadow:var(--shadow);overflow:hidden;}

    /* 왼쪽 고정 테이블 */
    .table-fixed{flex:0 0 var(--fix-w);width:var(--fix-w);overflow:hidden;border-right:2px solid #aacfbb;z-index:2;background:var(--panel);}
    .table-fixed table{width:var(--fix-w);table-layout:fixed;border-collapse:collapse;font-size:12.5px;}

    /* 오른쪽 스크롤 테이블 */
    .table-scroll{flex:1;overflow-x:auto;overflow-y:hidden;}
    .table-scroll table{border-collapse:collapse;font-size:12.5px;white-space:nowrap;}

    /* 공통 th/td */
    .tbl th{padding:7px 10px;font-size:11px;color:var(--muted);font-weight:600;border-bottom:1px solid var(--line);border-right:1px solid var(--line);background:#fafbfa;text-align:center;white-space:nowrap;}
    .tbl td{padding:6px 10px;border-bottom:1px solid var(--line);border-right:1px solid var(--line);text-align:right;vertical-align:middle;white-space:nowrap;height:36px;}
    .tbl th:last-child,.tbl td:last-child{border-right:none;}
    .tbl th.left{text-align:left;}
    .tbl td.left{text-align:left;}
    .tbl td.center{text-align:center;}
    .tbl tr.product-header td{background:#f0f7f2;font-weight:700;font-size:13px;color:var(--ink);border-bottom:1px solid #c8e6d0;}
    .tbl tr.no-data td{color:var(--muted);font-style:italic;text-align:left;}
    .tbl tr:hover td{background:#f7faf8;}
    .tbl tr.product-header:hover td{background:#e8f4ec;}
    .tbl th.group{background:#f0f3f0;font-size:11.5px;color:var(--ink);}

    .bdg{display:inline-block;padding:2px 7px;border-radius:14px;font-size:11px;font-weight:600;}
    .bdg.good{background:var(--good-bg);color:var(--good);}
    .bdg.caution{background:var(--caution-bg);color:var(--caution);}
    .bdg.bad{background:var(--bad-bg);color:var(--bad);}
    .loading{padding:60px 20px;text-align:center;color:var(--muted);}
    .empty-row{padding:40px 20px;text-align:center;color:var(--muted);}

    button{font-family:inherit;cursor:pointer;border:none;border-radius:8px;font-size:13px;font-weight:600;padding:8px 14px;transition:.12s;}
    .btn-primary{background:var(--accent);color:#fff;}
    .btn-ghost{background:#fff;color:var(--ink);border:1px solid var(--line);}

    #authGate{position:fixed;inset:0;z-index:9999;background:var(--bg);display:flex;align-items:center;justify-content:center;text-align:center;padding:24px;}
    /* ── 공통 NAV ── */
  .ssbon-nav{background:#fff;border-bottom:1px solid #e3e8e3;position:sticky;top:0;z-index:100;}
  .ssbon-nav-inner{max-width:1400px;margin:0 auto;padding:0 20px;height:52px;display:flex;align-items:center;}
  .ssbon-nav-brand{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:700;color:#1d2620;white-space:nowrap;margin-right:24px;text-decoration:none;}
  .ssbon-nav-dot{width:8px;height:8px;border-radius:50%;background:#2f7d4f;display:inline-block;flex-shrink:0;}
  .ssbon-nav-links{display:flex;gap:2px;flex:1;}
  .ssbon-nav-links a{text-decoration:none;font-size:13px;font-weight:600;color:#6b7770;padding:6px 12px;border-radius:8px;transition:.12s;white-space:nowrap;}
  .ssbon-nav-links a:hover{background:#f0f3f0;color:#1d2620;}
  .ssbon-nav-links a.active{background:#e7f2ec;color:#2f7d4f;}
  .ssbon-nav-right{margin-left:auto;display:flex;align-items:center;gap:8px;padding-left:16px;}
  .ssbon-who{font-size:12px;color:#6b7770;white-space:nowrap;}
  .ssbon-role{background:#e7f2ec;color:#2f7d4f;padding:2px 8px;border-radius:999px;font-size:11px;font-weight:700;}
  .ssbon-nav-btn{font-family:inherit;font-size:12px;font-weight:600;padding:5px 12px;border-radius:8px;cursor:pointer;color:#2f7d4f;background:#fff;border:1px solid #e3e8e3;}
  .ssbon-nav-btn:hover{background:#f0f3f0;}
  .ssbon-nav-btn.primary{color:#fff;background:#2f7d4f;border-color:#2f7d4f;}
  .ssbon-nav-btn.primary:hover{background:#266a42;}
  </style>
</head>
<body>

<nav class="ssbon-nav">
  <div class="ssbon-nav-inner">
    <a class="ssbon-nav-brand" href="simulator.html"><span class="ssbon-nav-dot"></span>순수본 가격도구</a>
    <div class="ssbon-nav-links">
      <a href="simulator.html" data-nav="simulator.html">가격 시뮬레이터</a>

      <a href="channels.html" data-nav="channels.html">채널 마스터</a>
      <a href="freight.html" data-nav="freight.html">운반비 마스터</a>
    </div>
    <div class="ssbon-nav-right">
      <span class="ssbon-who" id="nav-who"></span>
      <span class="ssbon-role" id="nav-role" style="display:none;"></span>

</nav>
<script>
(function(){
  var p=location.pathname.split('/').pop()||'index.html';
  document.querySelectorAll('.ssbon-nav-links a[data-nav]').forEach(function(a){
    if(a.getAttribute('data-nav')===p) a.classList.add('active');
  });
})();
</script>

<div id="authGate">
  <div>
    <p id="gateMsg" style="font-size:18px;font-weight:700;color:var(--ink);">로그인 확인 중...</p>
    <p id="gateSub" style="font-size:13px;color:var(--muted);margin-top:8px;"></p>
    <button id="gateBtn" style="display:none;margin-top:16px;font-family:inherit;font-size:14px;font-weight:600;color:#fff;background:#2f7d4f;border:none;border-radius:10px;padding:10px 22px;cursor:pointer;">로그아웃</button>
  </div>
</div>

<div id="app" style="display:none;">
  <div class="page-wrap">

    <!-- 필터 바 -->
    <div class="filter-bar">
      <label>상품</label>
      <select id="filter-product">
        <option value="">전체 상품</option>
      </select>
      <span class="filter-sep">|</span>
      <label>판매처</label>
      <select id="filter-channel">
        <option value="">전체 판매처</option>
      </select>
      <span class="filter-sep">|</span>
      <label>품온</label>
      <select id="filter-temp">
        <option value="">전체</option>
        <option value="실온">실온</option>
        <option value="냉장">냉장</option>
        <option value="냉동">냉동</option>
      </select>
      <div class="spacer"></div>
      <span style="font-size:12px;color:var(--muted);">
        <span class="badge-sm good">●</span> 20%↑&nbsp;
        <span class="badge-sm caution">●</span> 10~20%&nbsp;
        <span class="badge-sm bad">●</span> 10%↓
      </span>
    </div>

    <!-- 분리 테이블: 왼쪽 고정 + 오른쪽 스크롤 -->
    <div class="table-outer" id="table-outer">
      <div class="table-fixed" id="table-fixed"><div class="loading">불러오는 중...</div></div>
      <div class="table-scroll" id="table-scroll"></div>
    </div>

  </div>
</div>

<script>
  const SB_URL = "https://ngvgzfhvjaowwhnmmpex.supabase.co";
  const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5ndmd6Zmh2amFvd3dobm1tcGV4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAwMzgyNjQsImV4cCI6MjA5NTYxNDI2NH0.jO5Ab8trHPyamHhYFXi9UWvQ217pDJW9qplBWph8cgg";
  const sb = window.supabase.createClient(SB_URL, SB_KEY);

  function initNav(user) {
    var who = document.getElementById('nav-who');
    var role = document.getElementById('nav-role');
    var adminBtn = document.getElementById('nav-admin-btn');
    var logoutBtn = document.getElementById('nav-logout-btn');
    if(who) who.textContent = (user.name||user.email||'');
    if(role){ role.textContent = user.role||''; role.style.display='inline'; }
    if(adminBtn) adminBtn.style.display = (user.role==='admin')?'inline-block':'none';
    if(logoutBtn){
      logoutBtn.style.display='inline-block';
      logoutBtn.onclick = async function(){ await sb.auth.signOut(); location.href='index.html'; };
    }
  }

  let me = null;
  let allProducts = [], allChannels = [], allUnits = [], allLogistics = [], allFreight = [];
  let freightMap = {}; // temperature => consign_freight
  let logisticsMap = {}; // channel_id+temperature => {freight_rate, dist_rate}

  const $ = id => document.getElementById(id);
  const comma = n => Number(Math.round(n)||0).toLocaleString('ko-KR');
  const pct = n => n.toFixed(1)+'%';

  $('logoutBtn').addEventListener('click', async()=>{ await sb.auth.signOut(); location.href='./index.html'; });
  $('gateBtn').addEventListener('click',   async()=>{ await sb.auth.signOut(); location.href='./index.html'; });
  );

  (async function guard(){
    const { data:{ session } } = await sb.auth.getSession();
    if (!session){ location.href='./index.html'; return; }
    let p = null;
    try { const r = await sb.from('users').select('*').eq('id',session.user.id).single(); p=r.data; } catch(e){}
    if (p && p.is_active && p.role!=='pending'){
      me = p;
      $('authGate').style.display='none'; $('app').style.display='block';
      $('logoutBtn').style.display='inline-block';
      initNav(p);
      await loadAll();
    } else {
      $('gateMsg').textContent='승인 대기 중입니다';
      $('gateSub').textContent='관리자 승인 후 이용 가능합니다.';
      $('gateBtn').style.display='inline-block';
    }
  })();

  async function loadAll(){
    const [r1,r2,r3,r4,r5] = await Promise.all([
      sb.from('products').select('*').eq('is_active',true).order('code'),
      sb.from('channels').select('*').eq('is_active',true).order('name'),
      sb.from('product_units').select('*').eq('is_active',true).order('box_qty'),
      sb.from('logistics').select('*').eq('is_active',true),
      sb.from('channel_logistics').select('*'),
    ]);
    allProducts = r1.data||[];
    allChannels = r2.data||[];
    allUnits    = r3.data||[];
    allFreight  = r4.data||[];
    allLogistics= r5.data||[];

    // 위탁 운반비 맵
    allFreight.forEach(f=>{ freightMap[f.temperature] = f.consign_freight||0; });
    // 직납 운반비/유통사이익율 맵
    allLogistics.forEach(l=>{ logisticsMap[`${l.channel_id}_${l.temperature}`] = l; });

    // 필터 드롭다운 채우기
    const fp = $('filter-product');
    allProducts.forEach(p=>{ const o=document.createElement('option'); o.value=p.id; o.textContent=`${p.code} · ${p.name}`; fp.appendChild(o); });
    const fc = $('filter-channel');
    allChannels.forEach(c=>{ const o=document.createElement('option'); o.value=c.id; o.textContent=c.name; fc.appendChild(o); });

    renderTable();
  }

  ['filter-product','filter-channel','filter-temp'].forEach(id=>{
    $(id) && $(id).addEventListener('change', renderTable);
  });

  function calcProfit(price, boxQty, product, channel){
    if (!price) return null;
    const vatEx = price/1.1;
    const isDirect = channel.channel_type==='direct';
    const temp = product.temperature;
    const lKey = `${channel.id}_${temp}`;
    const lData = logisticsMap[lKey]||{freight_rate:0,dist_rate:0};
    const distRate = isDirect ? (lData.dist_rate||0) : 0;
    const distProfit = isDirect ? vatEx*(distRate/100) : 0;
    const supply = vatEx - distProfit;
    const cost = (product.unit_cost||0) * boxQty;
    const feeBase = channel.commission_base==='vat' ? price : supply;
    const fee = feeBase * ((channel.commission_rate||0)/100);
    const adVal = channel.ad_value||0;
    const ad = channel.ad_type==='fixed' ? adVal : supply*(adVal/100);
    const promoVal = channel.promotion_value||0;
    const promo = channel.promotion_type==='fixed' ? promoVal : supply*(promoVal/100);
    let freight;
    if(isDirect){ freight = supply*((lData.freight_rate||0)/100); }
    else { freight = (freightMap[temp]||0)/(boxQty||1); }
    const hqVal = channel.hq_value||0;
    const hq = channel.hq_type==='fixed' ? hqVal : supply*(hqVal/100);
    const divVal = channel.div_value||0;
    const div = channel.div_type==='fixed' ? divVal : supply*(divVal/100);
    const opProfit = supply-cost-fee-ad-promo-freight-hq-div;
    const opRate   = supply>0 ? opProfit/supply*100 : 0;
    return { opProfit, opRate };
  }

  function badge(rate){
    if(rate===null||isNaN(rate)) return '-';
    const cls = rate>=20?'good':rate>=10?'caution':'bad';
    return `<span class="bdg ${cls}">${pct(rate)}</span>`;
  }

  function renderTable(){
    const selProd = $('filter-product').value;
    const selChan = $('filter-channel').value;
    const selTemp = $('filter-temp').value;

    const products = allProducts.filter(p=>{
      if(selProd && String(p.id)!==String(selProd)) return false;
      if(selTemp && p.temperature!==selTemp) return false;
      return true;
    });
    const channels = allChannels.filter(c=>{
      if(selChan && String(c.id)!==String(selChan)) return false;
      return true;
    });

    const fixedDiv  = $('table-fixed');
    const scrollDiv = $('table-scroll');

    if(products.length===0||channels.length===0){
      fixedDiv.innerHTML  = '<div class="empty-row" style="padding:40px 20px;">표시할 데이터 없음</div>';
      scrollDiv.innerHTML = '';
      return;
    }

    const unitsMap = {};
    allUnits.forEach(u=>{
      if(!unitsMap[u.product_id]) unitsMap[u.product_id]=[];
      unitsMap[u.product_id].push(u);
    });

    // ── 왼쪽 고정 테이블 (상품/입수량 + 품온 + 원가) ──
    let fHtml = `<table class="tbl" style="width:350px;table-layout:fixed;">
      <thead>
        <tr>
          <th class="left" rowspan="3" style="width:220px;vertical-align:middle;">상품 / 입수량</th>
          <th rowspan="3" style="width:50px;vertical-align:middle;">품온</th>
          <th rowspan="3" style="width:80px;vertical-align:middle;border-right:none;">원가<br><span style="font-weight:400;">(EA)</span></th>
        </tr>
        <tr></tr><tr></tr>
      </thead>
      <tbody id="fixed-body">`;

    // ── 오른쪽 스크롤 테이블 ──
    let sHtml = `<table class="tbl">
      <thead>
        <tr>`;
    channels.forEach(c=>{
      sHtml += `<th colspan="9" class="group" style="border-right:2px solid var(--line);">${esc(c.name)} <span style="font-weight:400;font-size:11px;color:var(--muted);">${c.channel_type==='direct'?'직납':'위탁'}</span></th>`;
    });
    sHtml += `</tr><tr>`;
    channels.forEach(()=>{
      sHtml += `<th colspan="3" style="border-left:2px solid var(--line);background:#f0f7f2;font-size:11px;color:#2f7d4f;">정상판매가</th>`;
      sHtml += `<th colspan="3" style="border-left:1px solid var(--line);background:#f0f4f9;font-size:11px;color:#1a5fa8;">상시할인가</th>`;
      sHtml += `<th colspan="3" style="border-left:1px solid var(--line);border-right:2px solid var(--line);background:#fdf0f0;font-size:11px;color:#b4452f;">최대할인가</th>`;
    });
    sHtml += `</tr><tr>`;
    channels.forEach(()=>{
      sHtml += `<th style="border-left:2px solid var(--line);background:#f0f7f2;font-size:10.5px;">개당가</th><th style="background:#f0f7f2;font-size:10.5px;">판매가</th><th style="background:#f0f7f2;font-size:10.5px;">이익률</th>`;
      sHtml += `<th style="border-left:1px solid var(--line);background:#f0f4f9;font-size:10.5px;">개당가</th><th style="background:#f0f4f9;font-size:10.5px;">판매가</th><th style="background:#f0f4f9;font-size:10.5px;">이익률</th>`;
      sHtml += `<th style="border-left:1px solid var(--line);background:#fdf0f0;font-size:10.5px;">개당가</th><th style="background:#fdf0f0;font-size:10.5px;">판매가</th><th style="border-right:2px solid var(--line);background:#fdf0f0;font-size:10.5px;">이익률</th>`;
    });
    sHtml += `</tr></thead><tbody id="scroll-body">`;

    products.forEach(prod=>{
      const units = (unitsMap[prod.id]||[]).sort((a,b)=>a.box_qty-b.box_qty);
      const rowspan = units.length>0 ? units.length : 1;

      // 고정 테이블: 상품 헤더행
      fHtml += `<tr class="product-header">
        <td class="left" colspan="3" style="border-right:none;">
          <strong>${esc(prod.code||'')} ${esc(prod.name)}</strong>
        </td>
      </tr>`;
      // 스크롤 테이블: 상품 헤더행
      sHtml += `<tr class="product-header">`;
      channels.forEach(()=>{ sHtml += `<td colspan="9" style="border-right:2px solid var(--line);background:#f0f7f2;"></td>`; });
      sHtml += `</tr>`;

      if(units.length===0){
        fHtml += `<tr class="no-data"><td class="left" style="padding-left:16px;color:var(--muted);" colspan="3">가격정책 미등록</td></tr>`;
        sHtml += `<tr class="no-data">`;
        channels.forEach(()=>{ sHtml += `<td colspan="9" style="border-right:2px solid var(--line);text-align:center;color:var(--muted);">-</td>`; });
        sHtml += `</tr>`;
      } else {
        units.forEach(unit=>{
          const qty = unit.box_qty;
          const eaNp = qty>0 ? Math.round((unit.normal_price||0)/qty) : 0;
          const eaAp = qty>0 ? Math.round((unit.always_price||0)/qty) : 0;
          const eaMp = qty>0 ? Math.round((unit.max_price||0)/qty) : 0;

          fHtml += `<tr>
            <td class="left" style="padding-left:16px;">${qty}개입</td>
            <td class="center">${prod.temperature}</td>
            <td style="border-right:none;color:var(--muted);font-size:11px;">${comma((prod.unit_cost||0)*qty)}</td>
          </tr>`;

          sHtml += `<tr>`;
          channels.forEach(ch=>{
            const rn = calcProfit(unit.normal_price, qty, prod, ch);
            const ra = calcProfit(unit.always_price, qty, prod, ch);
            const rm = calcProfit(unit.max_price, qty, prod, ch);
            const bR = 'border-right:2px solid var(--line);';
            sHtml += `<td style="border-left:2px solid var(--line);background:#fafdf9;">${eaNp?comma(eaNp):'-'}</td>
                      <td style="background:#fafdf9;">${unit.normal_price?comma(unit.normal_price):'-'}</td>
                      <td style="background:#fafdf9;">${rn?badge(rn.opRate):'-'}</td>`;
            sHtml += `<td style="border-left:1px solid var(--line);background:#f7f9fd;">${eaAp?comma(eaAp):'-'}</td>
                      <td style="background:#f7f9fd;">${unit.always_price?comma(unit.always_price):'-'}</td>
                      <td style="background:#f7f9fd;">${ra?badge(ra.opRate):'-'}</td>`;
            sHtml += `<td style="border-left:1px solid var(--line);background:#fdf9f9;">${eaMp?comma(eaMp):'-'}</td>
                      <td style="background:#fdf9f9;">${unit.max_price?comma(unit.max_price):'-'}</td>
                      <td style="${bR}background:#fdf9f9;">${rm?badge(rm.opRate):'-'}</td>`;
          });
          sHtml += `</tr>`;
        });
      }
    });

    fHtml += `</tbody></table>`;
    sHtml += `</tbody></table>`;

    fixedDiv.innerHTML  = fHtml;
    scrollDiv.innerHTML = sHtml;

    // 행 높이 동기화: 왼쪽 행 높이를 오른쪽과 맞춤
    syncRowHeights();
  }

  function syncRowHeights(){
    const fRows = $('table-fixed').querySelectorAll('tr');
    const sRows = $('table-scroll').querySelectorAll('tr');
    const len = Math.min(fRows.length, sRows.length);
    for(let i=0; i<len; i++){
      fRows[i].style.height = '';
      sRows[i].style.height = '';
      const h = Math.max(fRows[i].offsetHeight, sRows[i].offsetHeight);
      fRows[i].style.height = h+'px';
      sRows[i].style.height = h+'px';
    }
  }


  function esc(s){return String(s??"").replace(/[&<>"']/g,ch=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));}
</script>
</body>
</html>
