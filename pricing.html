<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>가격정책 · 순수본 식품본부</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --bg:#f4f6f3; --panel:#fff; --ink:#1d2620; --muted:#6b7770; --line:#e3e8e3;
      --accent:#2f7d4f; --accent-soft:#e7f2ec; --warn:#b4441f;
      --good:#2f7d4f; --good-bg:#e7f2ec;
      --caution:#9a7b1f; --caution-bg:#f6efd8;
      --bad:#b4452f; --bad-bg:#f6e2dc;
      --radius:12px; --shadow:0 1px 2px rgba(20,40,30,.05),0 8px 24px rgba(20,40,30,.06);
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:"Pretendard",-apple-system,"Malgun Gothic",sans-serif;background:var(--bg);color:var(--ink);font-size:14px;line-height:1.5;}

    .ssbon-nav{background:#fff;border-bottom:1px solid #e3e8e3;}
    .ssbon-nav-inner{max-width:1400px;margin:0 auto;padding:0 18px;min-height:48px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
    .ssbon-nav-brand{display:flex;align-items:center;gap:7px;font-size:13px;font-weight:700;color:#1d2620;white-space:nowrap;}
    .ssbon-nav-dot{width:8px;height:8px;border-radius:50%;background:#2f7d4f;display:inline-block;}
    .ssbon-nav-links{display:flex;gap:4px;flex:1;}
    .ssbon-nav-links a{text-decoration:none;font-size:13px;font-weight:600;color:#6b7770;padding:6px 11px;border-radius:8px;transition:.12s;}
    .ssbon-nav-links a:hover{background:#f0f3f0;color:#1d2620;}
    .ssbon-nav-links a.active{background:#e7f2ec;color:#2f7d4f;}
    .ssbon-nav-right{margin-left:auto;display:flex;align-items:center;gap:8px;}
    .ssbon-nav-btn{font-family:inherit;font-size:12px;font-weight:600;padding:6px 12px;border-radius:8px;cursor:pointer;color:#2f7d4f;background:#fff;border:1px solid #e3e8e3;}
    .ssbon-nav-btn.primary{color:#fff;background:#2f7d4f;border-color:#2f7d4f;}
    .who-info{font-size:12px;color:#6b7770;}

    .page-wrap{max-width:1400px;margin:0 auto;padding:14px 18px 60px;}

    /* 필터 바 */
    .filter-bar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:14px;background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:12px 16px;box-shadow:var(--shadow);}
    .filter-bar label{font-size:12px;font-weight:600;color:var(--muted);white-space:nowrap;}
    .filter-bar select{font-family:inherit;font-size:13px;padding:6px 10px;border:1px solid var(--line);border-radius:8px;background:#fafbfa;color:var(--ink);}
    .filter-bar select:focus{outline:none;border-color:var(--accent);}
    .filter-sep{color:var(--line);font-size:18px;}
    .filter-bar .spacer{flex:1;}
    .badge-sm{font-size:11px;font-weight:600;padding:2px 8px;border-radius:10px;}
    .badge-sm.good{background:var(--good-bg);color:var(--good);}
    .badge-sm.caution{background:var(--caution-bg);color:var(--caution);}
    .badge-sm.bad{background:var(--bad-bg);color:var(--bad);}

    /* 엑셀형 테이블 */
    .table-wrap{overflow-x:auto;border:1px solid var(--line);border-radius:var(--radius);background:var(--panel);box-shadow:var(--shadow);}
    table.policy-table{width:100%;border-collapse:collapse;font-size:12.5px;min-width:1200px;}
    table.policy-table th{
      padding:7px 10px;font-size:11px;color:var(--muted);font-weight:600;
      border-bottom:1px solid var(--line);border-right:1px solid var(--line);
      background:#fafbfa;text-align:center;white-space:nowrap;position:sticky;top:0;z-index:2;
    }
    .sticky-col2{position:sticky;left:0;background:var(--panel);z-index:3;box-shadow:2px 0 4px rgba(0,0,0,.06);}
    table.policy-table th.left{text-align:left;}
    table.policy-table th.group{background:#f0f3f0;font-size:11.5px;color:var(--ink);}
    table.policy-table td{
      padding:6px 10px;border-bottom:1px solid var(--line);border-right:1px solid var(--line);
      text-align:right;vertical-align:middle;white-space:nowrap;
    }
    table.policy-table td:last-child{border-right:none;}
    table.policy-table th:last-child{border-right:none;}
    table.policy-table td.left{text-align:left;}
    table.policy-table td.center{text-align:center;}
    table.policy-table tr:hover td{background:#f7faf8;}
    table.policy-table tr.product-header td{
      background:#f0f7f2;font-weight:700;font-size:13px;color:var(--ink);
      border-bottom:1px solid #c8e6d0;
    }
    table.policy-table tr.no-data td{color:var(--muted);font-style:italic;text-align:center;}
    .sticky-col{position:sticky;left:0;background:var(--panel);z-index:3;}
    .s-temp{position:sticky;left:220px;background:var(--panel);z-index:3;}
    .s-cost{position:sticky;left:270px;background:var(--panel);z-index:3;box-shadow:3px 0 6px rgba(0,0,0,.08);}
    table.policy-table th.s-temp{z-index:5;background:#fafbfa;}
    table.policy-table th.s-cost{z-index:5;background:#fafbfa;}
    tr.product-header .s-temp{background:#f0f7f2;}
    tr.product-header .s-cost{background:#f0f7f2;}
    tr:hover .sticky-col{background:#f7faf8;}
    tr:hover .s-temp{background:#f7faf8;}
    tr:hover .s-cost{background:#f7faf8;}
    tr.product-header .sticky-col{background:#f0f7f2;}
    table.policy-table th.sticky-col{z-index:5;background:#fafbfa;}
    .bdg{display:inline-block;padding:2px 7px;border-radius:14px;font-size:11px;font-weight:600;}
    .bdg.good{background:var(--good-bg);color:var(--good);}
    .bdg.caution{background:var(--caution-bg);color:var(--caution);}
    .bdg.bad{background:var(--bad-bg);color:var(--bad);}
    .loading{padding:60px 20px;text-align:center;color:var(--muted);}
    .empty-row{padding:40px 20px;text-align:center;color:var(--muted);}

    button{font-family:inherit;cursor:pointer;border:none;border-radius:8px;font-size:13px;font-weight:600;padding:8px 14px;transition:.12s;}
    .btn-primary{background:var(--accent);color:#fff;}
    .btn-ghost{background:#fff;color:var(--ink);border:1px solid var(--line);}

    #authGate{position:fixed;inset:0;z-index:9999;background:var(--bg);display:flex;align-items:center;justify-content:center;text-align:center;padding:24px;}
  </style>
</head>
<body>

<div class="ssbon-nav">
  <div class="ssbon-nav-inner">
    <span class="ssbon-nav-brand"><i class="ssbon-nav-dot"></i>순수본 가격도구</span>
    <nav class="ssbon-nav-links">
      <a href="simulator.html" data-nav="simulator.html">가격 시뮬레이터</a>
      <a href="pricing.html" data-nav="pricing.html">가격정책</a>
      <a href="products.html" data-nav="products.html">상품 마스터</a>
      <a href="channels.html" data-nav="channels.html">채널 마스터</a>
      <a href="freight.html" data-nav="freight.html">운반비 마스터</a>
    </nav>
    <div class="ssbon-nav-right">
      <span class="who-info" id="who-info"></span>
      <button id="adminBtn" class="ssbon-nav-btn primary" style="display:none;">사용자 관리</button>
      <button id="logoutBtn" class="ssbon-nav-btn" style="display:none;">로그아웃</button>
    </div>
  </div>
</div>
<script>
  (function(){
    var page=location.pathname.split("/").pop()||"index.html";
    document.querySelectorAll('.ssbon-nav-links a[data-nav]').forEach(function(a){
      if(a.getAttribute("data-nav")===page) a.classList.add("active");
    });
  })();
</script>

<div id="authGate">
  <div>
    <p id="gateMsg" style="font-size:18px;font-weight:700;color:var(--ink);">로그인 확인 중...</p>
    <p id="gateSub" style="font-size:13px;color:var(--muted);margin-top:8px;"></p>
    <button id="gateBtn" style="display:none;margin-top:16px;font-family:inherit;font-size:14px;font-weight:600;color:#fff;background:#2f7d4f;border:none;border-radius:10px;padding:10px 22px;cursor:pointer;">로그아웃</button>
  </div>
</div>

<div id="app" style="display:none;">
  <div class="page-wrap">

    <!-- 필터 바 -->
    <div class="filter-bar">
      <label>상품</label>
      <select id="filter-product">
        <option value="">전체 상품</option>
      </select>
      <span class="filter-sep">|</span>
      <label>판매처</label>
      <select id="filter-channel">
        <option value="">전체 판매처</option>
      </select>
      <span class="filter-sep">|</span>
      <label>품온</label>
      <select id="filter-temp">
        <option value="">전체</option>
        <option value="실온">실온</option>
        <option value="냉장">냉장</option>
        <option value="냉동">냉동</option>
      </select>
      <div class="spacer"></div>
      <span style="font-size:12px;color:var(--muted);">
        <span class="badge-sm good">●</span> 20%↑&nbsp;
        <span class="badge-sm caution">●</span> 10~20%&nbsp;
        <span class="badge-sm bad">●</span> 10%↓
      </span>
    </div>

    <!-- 테이블 -->
    <div class="table-wrap" id="table-wrap">
      <div class="loading" id="loading">데이터를 불러오는 중...</div>
    </div>

  </div>
</div>

<script>
  const SB_URL = "https://ngvgzfhvjaowwhnmmpex.supabase.co";
  const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5ndmd6Zmh2amFvd3dobm1tcGV4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAwMzgyNjQsImV4cCI6MjA5NTYxNDI2NH0.jO5Ab8trHPyamHhYFXi9UWvQ217pDJW9qplBWph8cgg";
  const sb = window.supabase.createClient(SB_URL, SB_KEY);

  let me = null;
  let allProducts = [], allChannels = [], allUnits = [], allLogistics = [], allFreight = [];
  let freightMap = {}; // temperature => consign_freight
  let logisticsMap = {}; // channel_id+temperature => {freight_rate, dist_rate}

  const $ = id => document.getElementById(id);
  const comma = n => Number(Math.round(n)||0).toLocaleString('ko-KR');
  const pct = n => n.toFixed(1)+'%';

  $('logoutBtn').addEventListener('click', async()=>{ await sb.auth.signOut(); location.href='./index.html'; });
  $('gateBtn').addEventListener('click',   async()=>{ await sb.auth.signOut(); location.href='./index.html'; });
  $('adminBtn').addEventListener('click',  ()=>{ location.href='./admin.html'; });

  (async function guard(){
    const { data:{ session } } = await sb.auth.getSession();
    if (!session){ location.href='./index.html'; return; }
    let p = null;
    try { const r = await sb.from('users').select('*').eq('id',session.user.id).single(); p=r.data; } catch(e){}
    if (p && p.is_active && p.role!=='pending'){
      me = p;
      $('authGate').style.display='none'; $('app').style.display='block';
      $('logoutBtn').style.display='inline-block';
      $('who-info').textContent = (p.name||p.email||'')+(p.role?' · '+p.role:'');
      if(p.role==='admin') $('adminBtn').style.display='inline-block';
      await loadAll();
    } else {
      $('gateMsg').textContent='승인 대기 중입니다';
      $('gateSub').textContent='관리자 승인 후 이용 가능합니다.';
      $('gateBtn').style.display='inline-block';
    }
  })();

  async function loadAll(){
    const [r1,r2,r3,r4,r5] = await Promise.all([
      sb.from('products').select('*').eq('is_active',true).order('code'),
      sb.from('channels').select('*').eq('is_active',true).order('name'),
      sb.from('product_units').select('*').eq('is_active',true).order('box_qty'),
      sb.from('logistics').select('*').eq('is_active',true),
      sb.from('channel_logistics').select('*'),
    ]);
    allProducts = r1.data||[];
    allChannels = r2.data||[];
    allUnits    = r3.data||[];
    allFreight  = r4.data||[];
    allLogistics= r5.data||[];

    // 위탁 운반비 맵
    allFreight.forEach(f=>{ freightMap[f.temperature] = f.consign_freight||0; });
    // 직납 운반비/유통사이익율 맵
    allLogistics.forEach(l=>{ logisticsMap[`${l.channel_id}_${l.temperature}`] = l; });

    // 필터 드롭다운 채우기
    const fp = $('filter-product');
    allProducts.forEach(p=>{ const o=document.createElement('option'); o.value=p.id; o.textContent=`${p.code} · ${p.name}`; fp.appendChild(o); });
    const fc = $('filter-channel');
    allChannels.forEach(c=>{ const o=document.createElement('option'); o.value=c.id; o.textContent=c.name; fc.appendChild(o); });

    renderTable();
  }

  ['filter-product','filter-channel','filter-temp'].forEach(id=>{
    $(id) && $(id).addEventListener('change', renderTable);
  });

  function calcProfit(price, boxQty, product, channel){
    if (!price) return null;
    const vatEx = price/1.1;
    const isDirect = channel.channel_type==='direct';
    const temp = product.temperature;
    const lKey = `${channel.id}_${temp}`;
    const lData = logisticsMap[lKey]||{freight_rate:0,dist_rate:0};
    const distRate = isDirect ? (lData.dist_rate||0) : 0;
    const distProfit = isDirect ? vatEx*(distRate/100) : 0;
    const supply = vatEx - distProfit;
    const cost = (product.unit_cost||0) * boxQty;
    const feeBase = channel.commission_base==='vat' ? price : supply;
    const fee = feeBase * ((channel.commission_rate||0)/100);
    const adVal = channel.ad_value||0;
    const ad = channel.ad_type==='fixed' ? adVal : supply*(adVal/100);
    const promoVal = channel.promotion_value||0;
    const promo = channel.promotion_type==='fixed' ? promoVal : supply*(promoVal/100);
    let freight;
    if(isDirect){ freight = supply*((lData.freight_rate||0)/100); }
    else { freight = (freightMap[temp]||0)/(boxQty||1); }
    const hqVal = channel.hq_value||0;
    const hq = channel.hq_type==='fixed' ? hqVal : supply*(hqVal/100);
    const divVal = channel.div_value||0;
    const div = channel.div_type==='fixed' ? divVal : supply*(divVal/100);
    const opProfit = supply-cost-fee-ad-promo-freight-hq-div;
    const opRate   = supply>0 ? opProfit/supply*100 : 0;
    return { opProfit, opRate };
  }

  function badge(rate){
    if(rate===null||isNaN(rate)) return '-';
    const cls = rate>=20?'good':rate>=10?'caution':'bad';
    return `<span class="bdg ${cls}">${pct(rate)}</span>`;
  }

  function renderTable(){
    const selProd = $('filter-product').value;
    const selChan = $('filter-channel').value;
    const selTemp = $('filter-temp').value;

    const products = allProducts.filter(p=>{
      if(selProd && String(p.id)!==String(selProd)) return false;
      if(selTemp && p.temperature!==selTemp) return false;
      return true;
    });
    const channels = allChannels.filter(c=>{
      if(selChan && String(c.id)!==String(selChan)) return false;
      return true;
    });

    const wrap = $('table-wrap');

    if(products.length===0||channels.length===0){
      wrap.innerHTML = '<div class="empty-row">표시할 데이터가 없습니다. 가격정책을 먼저 시뮬레이터에서 저장해 주세요.</div>';
      return;
    }

    // 각 상품의 product_units 맵
    const unitsMap = {}; // product_id => [unit, ...]
    allUnits.forEach(u=>{
      if(!unitsMap[u.product_id]) unitsMap[u.product_id]=[];
      unitsMap[u.product_id].push(u);
    });

    let html = `<table class="policy-table"><thead>
      <tr>
        <th class="left sticky-col" rowspan="3" style="min-width:220px;border-right:1px solid var(--line);vertical-align:middle;">상품 / 입수량</th>
        <th class="s-temp" rowspan="3" style="width:50px;border-right:1px solid var(--line);vertical-align:middle;">품온</th>
        <th class="s-cost" rowspan="3" style="width:80px;border-right:2px solid var(--line);vertical-align:middle;font-size:11px;">원가<br><span style="font-weight:400;">(EA)</span></th>`;

    // 채널별 헤더 1행: 채널명, 10컬럼씩 (원가제외, 정상3+상시3+최대3+이익1)
    channels.forEach(c=>{
      html += `<th colspan="9" class="group" style="border-right:2px solid var(--line);">${esc(c.name)}<span style="font-weight:400;font-size:11px;color:var(--muted);margin-left:6px;">${c.channel_type==='direct'?'직납':'위탁'}</span></th>`;
    });
    html += `</tr><tr>`;

    // 헤더 2행: 정상/상시/최대 그룹 (각 3컬럼)
    channels.forEach(c=>{
      html += `<th colspan="3" style="border-left:2px solid var(--line);background:#f0f7f2;font-size:11px;color:#2f7d4f;border-bottom:1px solid #b8dfc8;">정상판매가</th>`;
      html += `<th colspan="3" style="border-left:1px solid var(--line);background:#f0f4f9;font-size:11px;color:#1a5fa8;border-bottom:1px solid #b8cfe0;">상시할인가</th>`;
      html += `<th colspan="3" style="border-left:1px solid var(--line);border-right:2px solid var(--line);background:#fdf0f0;font-size:11px;color:#b4452f;border-bottom:1px solid #e0c0b8;">최대할인가</th>`;
    });
    html += `</tr><tr>`;

    // 헤더 3행: 개당가/판매가/이익률
    channels.forEach(c=>{
      html += `<th style="border-left:2px solid var(--line);background:#f0f7f2;font-size:10.5px;">개당가</th>
               <th style="background:#f0f7f2;font-size:10.5px;">판매가</th>
               <th style="background:#f0f7f2;font-size:10.5px;">이익률</th>`;
      html += `<th style="border-left:1px solid var(--line);background:#f0f4f9;font-size:10.5px;">개당가</th>
               <th style="background:#f0f4f9;font-size:10.5px;">판매가</th>
               <th style="background:#f0f4f9;font-size:10.5px;">이익률</th>`;
      html += `<th style="border-left:1px solid var(--line);background:#fdf0f0;font-size:10.5px;">개당가</th>
               <th style="background:#fdf0f0;font-size:10.5px;">판매가</th>
               <th style="border-right:2px solid var(--line);background:#fdf0f0;font-size:10.5px;">이익률</th>`;
    });
    html += `</tr></thead><tbody>`;

    products.forEach(prod=>{
      const units = (unitsMap[prod.id]||[]).sort((a,b)=>a.box_qty-b.box_qty);

      // 상품 헤더 행
      html += `<tr class="product-header">
        <td class="left sticky-col" style="border-right:1px solid var(--line);">
          <strong>${esc(prod.code||'')} ${esc(prod.name)}</strong>
        </td>
        <td class="center s-temp" style="background:#f0f7f2;border-right:1px solid var(--line);">${prod.temperature}</td>
        <td class="s-cost" style="background:#f0f7f2;border-right:2px solid var(--line);text-align:right;font-size:12px;color:var(--muted);"></td>`;
      channels.forEach(()=>{ html += `<td colspan="9" style="border-right:2px solid var(--line);background:#f0f7f2;"></td>`; });
      html += `</tr>`;

      if(units.length===0){
        html += `<tr class="no-data"><td class="sticky-col" style="border-right:1px solid var(--line);padding-left:20px;color:var(--muted);font-style:italic;text-align:left;">가격정책 미등록</td>
          <td class="s-temp" style="border-right:1px solid var(--line);"></td>
          <td class="s-cost" style="border-right:2px solid var(--line);"></td>`;
        channels.forEach(()=>{ html += `<td colspan="9" style="border-right:2px solid var(--line);text-align:center;color:var(--muted);">-</td>`; });
        html += `</tr>`;
      } else {
        units.forEach(unit=>{
          const qty = unit.box_qty;
          const eaNp = qty>0 ? Math.round((unit.normal_price||0)/qty) : 0;
          const eaAp = qty>0 ? Math.round((unit.always_price||0)/qty) : 0;
          const eaMp = qty>0 ? Math.round((unit.max_price||0)/qty) : 0;

          html += `<tr>
            <td class="left sticky-col" style="padding-left:20px;border-right:1px solid var(--line);">
              ${qty}개입
            </td>
            <td class="center s-temp" style="border-right:1px solid var(--line);">${prod.temperature}</td>
            <td class="s-cost" style="border-right:2px solid var(--line);text-align:right;font-size:12px;color:var(--muted);">${comma((prod.unit_cost||0)*qty)}원</td>`;

          channels.forEach((ch,ci)=>{
            const rn = calcProfit(unit.normal_price, qty, prod, ch);
            const ra = calcProfit(unit.always_price, qty, prod, ch);
            const rm = calcProfit(unit.max_price, qty, prod, ch);
            const borderR = 'border-right:2px solid var(--line);';

            // 정상판매가
            html += `<td style="border-left:2px solid var(--line);background:#fafdf9;">${eaNp?comma(eaNp):'-'}</td>
                     <td style="background:#fafdf9;">${unit.normal_price?comma(unit.normal_price):'-'}</td>
                     <td style="background:#fafdf9;">${rn?badge(rn.opRate):'-'}</td>`;
            // 상시할인가
            html += `<td style="border-left:1px solid var(--line);background:#f7f9fd;">${eaAp?comma(eaAp):'-'}</td>
                     <td style="background:#f7f9fd;">${unit.always_price?comma(unit.always_price):'-'}</td>
                     <td style="background:#f7f9fd;">${ra?badge(ra.opRate):'-'}</td>`;
            // 최대할인가
            html += `<td style="border-left:1px solid var(--line);background:#fdf9f9;">${eaMp?comma(eaMp):'-'}</td>
                     <td style="background:#fdf9f9;">${unit.max_price?comma(unit.max_price):'-'}</td>
                     <td style="${borderR}background:#fdf9f9;">${rm?badge(rm.opRate):'-'}</td>`;
          });
          html += `</tr>`;
        });
      }
    });

    html += `</tbody></table>`;
    wrap.innerHTML = html;
  }

  function esc(s){return String(s??"").replace(/[&<>"']/g,ch=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));}
</script>
</body>
</html>
