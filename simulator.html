<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>가격 시뮬레이터 · 순수본 식품본부</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --bg:#f4f6f3; --panel:#fff; --ink:#1d2620; --muted:#6b7770; --line:#e3e8e3;
      --accent:#2f7d4f; --accent-soft:#e7f2ec; --warn:#b4441f;
      --good:#2f7d4f; --good-bg:#e7f2ec;
      --caution:#9a7b1f; --caution-bg:#f6efd8;
      --bad:#b4452f; --bad-bg:#f6e2dc;
      --radius:12px; --shadow:0 1px 2px rgba(20,40,30,.05),0 8px 24px rgba(20,40,30,.06);
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:"Pretendard",-apple-system,"Malgun Gothic",sans-serif;background:var(--bg);color:var(--ink);font-size:14px;line-height:1.5;}

    /* 네비게이션 */
    .ssbon-nav{background:#fff;border-bottom:1px solid #e3e8e3;}
    .ssbon-nav-inner{max-width:1400px;margin:0 auto;padding:0 18px;min-height:48px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;}
    .ssbon-nav-brand{display:flex;align-items:center;gap:7px;font-size:13px;font-weight:700;color:#1d2620;white-space:nowrap;}
    .ssbon-nav-dot{width:8px;height:8px;border-radius:50%;background:#2f7d4f;display:inline-block;}
    .ssbon-nav-links{display:flex;gap:4px;flex:1;}
    .ssbon-nav-links a{text-decoration:none;font-size:13px;font-weight:600;color:#6b7770;padding:6px 11px;border-radius:8px;transition:.12s;}
    .ssbon-nav-links a:hover{background:#f0f3f0;color:#1d2620;}
    .ssbon-nav-links a.active{background:#e7f2ec;color:#2f7d4f;}
    .ssbon-nav-right{margin-left:auto;display:flex;gap:8px;}
    .ssbon-nav-btn{font-family:inherit;font-size:12px;font-weight:600;padding:6px 12px;border-radius:8px;cursor:pointer;color:#2f7d4f;background:#fff;border:1px solid #e3e8e3;}
    .ssbon-nav-btn.primary{color:#fff;background:#2f7d4f;border-color:#2f7d4f;}

    /* 레이아웃 */
    .sim-layout{display:grid;grid-template-columns:300px 1fr;gap:14px;padding:16px 18px 40px;max-width:1400px;margin:0 auto;}
    .left-col{display:flex;flex-direction:column;gap:10px;}
    .right-col{display:flex;flex-direction:column;gap:10px;}

    /* 카드 */
    .card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:14px 16px;}
    .card-title{font-size:12px;font-weight:700;color:var(--muted);margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:6px;}

    /* 폼 요소 */
    .fl{display:flex;flex-direction:column;gap:4px;margin-bottom:10px;}
    .fl:last-child{margin-bottom:0;}
    .fl label{font-size:11px;font-weight:600;color:var(--muted);}
    .fl select,.fl input[type="number"]{font-family:inherit;font-size:13px;padding:8px 10px;border:1px solid var(--line);border-radius:8px;background:#fafbfa;color:var(--ink);width:100%;}
    .fl select:focus,.fl input:focus{outline:none;border-color:var(--accent);}
    .fl .auto{background:#f0f3f0;color:var(--muted);font-size:12px;}
    .g2{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
    .combo{display:flex;gap:6px;}
    .combo select{width:80px;flex-shrink:0;}
    .combo input{flex:1;}

    /* 직납 유통사이익율 박스 */
    .dist-box{display:none;background:var(--accent-soft);border-radius:8px;padding:8px 10px;margin-top:6px;font-size:12px;color:var(--accent);font-weight:600;}

    /* 정보 표시 */
    .info-bar{background:var(--accent-soft);border-radius:8px;padding:8px 10px;font-size:12px;color:var(--accent);margin-top:6px;display:none;}

    /* 손익 비교표 */
    .tbl-card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;}
    .tbl-head{padding:12px 16px;border-bottom:1px solid var(--line);font-size:12px;font-weight:700;color:var(--muted);}
    table.result{width:100%;border-collapse:collapse;font-size:13px;}
    table.result th{padding:9px 12px;font-size:11px;color:var(--muted);font-weight:600;border-bottom:1px solid var(--line);background:#fafbfa;text-align:center;white-space:nowrap;}
    table.result th.tl{text-align:left;}
    table.result td{padding:9px 12px;border-bottom:1px solid var(--line);text-align:center;vertical-align:middle;}
    table.result td.tl{text-align:left;font-weight:600;}
    table.result tr:last-child td{border-bottom:none;}
    table.result tbody tr:hover{background:#f7faf8;cursor:pointer;}
    table.result tbody tr.sel td{background:#f0f7f1;}
    .bdg{display:inline-block;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:600;min-width:60px;text-align:center;}
    .bdg.good{background:var(--good-bg);color:var(--good);}
    .bdg.caution{background:var(--caution-bg);color:var(--caution);}
    .bdg.bad{background:var(--bad-bg);color:var(--bad);}
    .bl{border-left:1px solid var(--line);}

    /* 상세 패널 */
    .detail{display:none;background:#f8faf8;border-top:1px solid var(--line);padding:16px;}
    .detail.show{display:block;}
    .detail-title{font-size:12px;font-weight:700;margin-bottom:12px;color:var(--ink);}
    .detail-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
    .dcol{background:#fff;border:1px solid var(--line);border-radius:10px;padding:12px;}
    .dcol-head{font-size:11px;font-weight:700;padding-bottom:7px;margin-bottom:8px;border-bottom:1px solid var(--line);}
    .dcol-head.n{color:#2f7d4f;} .dcol-head.a{color:#1e5c36;} .dcol-head.m{color:#13412a;}
    .dr{display:flex;justify-content:space-between;padding:2px 0;font-size:11px;}
    .dr .k{color:var(--muted);} .dr .v{color:var(--ink);}
    .dr.b .k,.dr.b .v{font-weight:700;color:var(--ink);font-size:11.5px;}
    .dvl{height:1px;background:var(--line);margin:4px 0;}

    /* 액션 버튼 */
    .action-row{display:flex;gap:8px;padding:12px 16px;border-top:1px solid var(--line);background:#fafbfa;}
    button{font-family:inherit;cursor:pointer;border:none;border-radius:8px;font-size:13px;font-weight:600;padding:8px 14px;transition:.12s;}
    .btn-primary{background:var(--accent);color:#fff;} .btn-primary:hover{opacity:.9;}
    .btn-ghost{background:#fff;color:var(--ink);border:1px solid var(--line);} .btn-ghost:hover{background:#f0f3f0;}
    .btn-save-scenario{background:#1a5fa8;color:#fff;} .btn-save-scenario:hover{opacity:.9;}
    .saved-msg{font-size:12px;color:var(--accent);opacity:0;transition:.3s;align-self:center;}
    .saved-msg.show{opacity:1;}

    /* 빈 상태 */
    .placeholder{padding:48px 20px;text-align:center;color:var(--muted);font-size:13px;}

    /* 게이트 */
    #authGate{position:fixed;inset:0;z-index:9999;background:var(--bg);display:flex;align-items:center;justify-content:center;text-align:center;padding:24px;}
  </style>
</head>
<body>

<!-- 네비게이션 -->
<div class="ssbon-nav">
  <div class="ssbon-nav-inner">
    <span class="ssbon-nav-brand"><i class="ssbon-nav-dot"></i>순수본 가격도구</span>
    <nav class="ssbon-nav-links">
      <a href="simulator.html" data-nav="simulator.html">가격 시뮬레이터</a>
      <a href="pricing.html" data-nav="pricing.html">가격정책</a>
      <a href="products.html" data-nav="products.html">상품 마스터</a>
      <a href="channels.html" data-nav="channels.html">채널 마스터</a>
      <a href="freight.html" data-nav="freight.html">운반비 마스터</a>
    </nav>
    <div class="ssbon-nav-right">
      <span id="who-info" style="font-size:12px;color:var(--muted);"></span>
      <button id="adminBtn" class="ssbon-nav-btn primary" style="display:none;">사용자 관리</button>
      <button id="logoutBtn" class="ssbon-nav-btn" style="display:none;">로그아웃</button>
    </div>
  </div>
</div>
<script>
  (function(){
    var page=location.pathname.split("/").pop()||"index.html";
    document.querySelectorAll('.ssbon-nav-links a[data-nav]').forEach(function(a){
      if(a.getAttribute("data-nav")===page) a.classList.add("active");
    });
  })();
</script>

<!-- 로그인 게이트 -->
<div id="authGate">
  <div>
    <p id="gateMsg" style="font-size:18px;font-weight:700;color:var(--ink);">로그인 확인 중...</p>
    <p id="gateSub" style="font-size:13px;color:var(--muted);margin-top:8px;"></p>
    <button id="gateBtn" style="display:none;margin-top:16px;" class="btn-primary">로그아웃</button>
  </div>
</div>

<!-- 메인 레이아웃 -->
<div id="app" style="display:none;">
<div class="sim-layout">

  <!-- ── 왼쪽: 설정 패널 ── -->
  <div class="left-col">

    <!-- 상품 선택 -->
    <div class="card">
      <div class="card-title">📦 상품 선택</div>
      <div class="fl">
        <label>상품</label>
        <select id="sel-product"><option value="">-- 상품 선택 --</option></select>
      </div>
      <div class="info-bar" id="product-info"></div>
    </div>

    <!-- 판매처 선택 -->
    <div class="card">
      <div class="card-title">🏪 판매처 선택</div>
      <div class="fl">
        <label>판매처</label>
        <select id="sel-channel"><option value="">-- 판매처 선택 --</option></select>
      </div>
      <div class="g2" style="margin-top:8px;">
        <div class="fl">
          <label>채널 유형</label>
          <input type="text" id="disp-chtype" class="auto" disabled />
        </div>
        <div class="fl">
          <label>수수료 기준</label>
          <input type="text" id="disp-feebase" class="auto" disabled />
        </div>
      </div>
      <div class="dist-box" id="dist-box"></div>
    </div>

    <!-- 직접 판관비 -->
    <div class="card">
      <div class="card-title">🧾 직접 판관비</div>
      <div class="g2">
        <div class="fl">
          <label>지급수수료 (%)</label>
          <input type="number" id="feeRate" value="0" />
        </div>
        <div class="fl">
          <label>운반비 (자동)</label>
          <input type="text" id="disp-freight" class="auto" disabled />
        </div>
      </div>
      <div class="fl">
        <label>광고선전비</label>
        <div class="combo">
          <select id="adType"><option value="rate">정률 %</option><option value="fixed">정액 원</option></select>
          <input type="number" id="adValue" value="0" />
        </div>
      </div>
      <div class="fl">
        <label>판매촉진비</label>
        <div class="combo">
          <select id="promoType"><option value="rate">정률 %</option><option value="fixed">정액 원</option></select>
          <input type="number" id="promoValue" value="0" />
        </div>
      </div>
    </div>

    <!-- 간접 판관비 -->
    <div class="card">
      <div class="card-title">🏢 간접 판관비</div>
      <div class="g2">
        <div class="fl">
          <label>본부공통비</label>
          <div class="combo">
            <select id="hqType"><option value="rate">정률 %</option><option value="fixed">정액 원</option></select>
            <input type="number" id="hqValue" value="0" />
          </div>
        </div>
        <div class="fl">
          <label>부문공통비</label>
          <div class="combo">
            <select id="divType"><option value="rate">정률 %</option><option value="fixed">정액 원</option></select>
            <input type="number" id="divValue" value="0" />
          </div>
        </div>
      </div>
    </div>

  </div>

  <!-- ── 오른쪽: 결과 ── -->
  <div class="right-col">
    <div class="tbl-card" id="result-wrap">
      <div class="tbl-head">손익 비교표 — 행 클릭 시 상세 내역</div>
      <div style="overflow-x:auto;">
        <table class="result">
          <thead>
            <tr>
              <th class="tl" rowspan="2" style="vertical-align:middle;">입수량</th>
              <th colspan="2" class="bl">정상판매가</th>
              <th colspan="2" class="bl">상시할인가</th>
              <th colspan="2" class="bl">최대할인가</th>
            </tr>
            <tr>
              <th class="bl">판매가</th><th>이익률</th>
              <th class="bl">판매가</th><th>이익률</th>
              <th class="bl">판매가</th><th>이익률</th>
            </tr>
          </thead>
          <tbody id="result-body">
            <tr><td colspan="7" class="placeholder">상품과 판매처를 선택하면 손익 비교표가 나타납니다</td></tr>
          </tbody>
        </table>
      </div>

      <!-- 상세 패널 -->
      <div class="detail" id="detail-panel">
        <div class="detail-title" id="detail-title"></div>
        <div class="detail-grid" id="detail-grid"></div>
      </div>

      <!-- 액션 버튼 -->
      <div class="action-row" id="action-row" style="display:none;">
        <button class="btn-primary" id="btn-apply-pricing" style="display:none;">가격정책에 반영</button>
        <button class="btn-save-scenario" id="btn-save-scenario">내 시나리오 저장</button>
        <span class="saved-msg" id="saved-msg"></span>
      </div>
    </div>
  </div>

</div>
</div>

<script>
  const SB_URL  = "https://ngvgzfhvjaowwhnmmpex.supabase.co";
  const SB_KEY  = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5ndmd6Zmh2amFvd3dobm1tcGV4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAwMzgyNjQsImV4cCI6MjA5NTYxNDI2NH0.jO5Ab8trHPyamHhYFXi9UWvQ217pDJW9qplBWph8cgg";
  const sb = window.supabase.createClient(SB_URL, SB_KEY);

  let me = null, canEdit = false;
  let currentProduct = null, currentChannel = null, currentUnits = [];
  let freightMaster = {
    '실온':{consign:0,dRate:0,dDist:0},
    '냉장':{consign:0,dRate:0,dDist:0},
    '냉동':{consign:0,dRate:0,dDist:0},
  };

  const $ = id => document.getElementById(id);
  const won = n => Math.round(n).toLocaleString('ko-KR')+'원';
  const pct = n => n.toFixed(1)+'%';
  const comma = n => Number(n||0).toLocaleString('ko-KR');

  // ── 인증 게이트 ──
  $('logoutBtn').addEventListener('click', async()=>{ await sb.auth.signOut(); location.href='./index.html'; });
  $('gateBtn').addEventListener('click',   async()=>{ await sb.auth.signOut(); location.href='./index.html'; });
  $('adminBtn').addEventListener('click',  ()=>{ location.href='./admin.html'; });

  (async function guard(){
    const { data:{ session } } = await sb.auth.getSession();
    if (!session){ location.href='./index.html'; return; }
    let p = null;
    try { const r = await sb.from('users').select('*').eq('id',session.user.id).single(); p=r.data; } catch(e){}
    if (p && p.is_active && p.role!=='pending'){
      me = p;
      canEdit = (p.role==='master'||p.role==='admin');
      $('authGate').style.display = 'none';
      $('app').style.display = 'block';
      $('logoutBtn').style.display = 'inline-block';
      $('who-info').textContent = (p.name||p.email||'')+(p.role?' · '+p.role:'');
      if(p.role==='admin') $('adminBtn').style.display='inline-block';
      if(canEdit) $('btn-apply-pricing').style.display='inline-block';
      await loadAllMasters();
    } else {
      $('gateMsg').textContent='승인 대기 중입니다';
      $('gateSub').textContent='관리자 승인이 완료되면 이용할 수 있습니다.';
      $('gateBtn').style.display='inline-block';
    }
  })();

  // ── 마스터 로드 ──
  async function loadAllMasters(){
    await Promise.all([loadProducts(), loadChannels(), loadFreight()]);
  }

  async function loadProducts(){
    const { data } = await sb.from('products').select('*').eq('is_active',true).order('code');
    if (!data) return;
    const sel = $('sel-product');
    sel.innerHTML = '<option value="">-- 상품 선택 --</option>';
    data.forEach(p=>{
      const o = document.createElement('option');
      o.value = p.id;
      o.textContent = `${p.code} · ${p.name}`;
      o.dataset.info = JSON.stringify(p);
      sel.appendChild(o);
    });
  }

  async function loadChannels(){
    const { data } = await sb.from('channels').select('*').eq('is_active',true).order('name');
    if (!data) return;
    const sel = $('sel-channel');
    sel.innerHTML = '<option value="">-- 판매처 선택 --</option>';
    data.forEach(c=>{
      const o = document.createElement('option');
      o.value = c.id;
      o.textContent = c.name;
      o.dataset.info = JSON.stringify(c);
      sel.appendChild(o);
    });
  }

  async function loadFreight(){
    const { data } = await sb.from('logistics').select('temperature,consign_freight').eq('is_active',true);
    if (data) data.forEach(r=>{ if(freightMaster[r.temperature]) freightMaster[r.temperature].consign=r.consign_freight||0; });
  }

  async function loadDirectFreight(channelId){
    const { data } = await sb.from('channel_logistics').select('*').eq('channel_id',channelId);
    if (data) data.forEach(r=>{
      if(freightMaster[r.temperature]){
        freightMaster[r.temperature].dRate = r.freight_rate||0;
        freightMaster[r.temperature].dDist = r.dist_rate||0;
      }
    });
  }

  // ── 상품 선택 ──
  $('sel-product').addEventListener('change', async e=>{
    const opt = e.target.options[e.target.selectedIndex];
    if (!opt.dataset.info){ currentProduct=null; currentUnits=[]; renderTable(); return; }
    currentProduct = JSON.parse(opt.dataset.info);

    const info = $('product-info');
    info.style.display = 'block';
    info.textContent = `품온: ${currentProduct.temperature} · 단량: ${comma(currentProduct.unit_weight)}g · EA원가: ${comma(currentProduct.unit_cost)}원`;

    // product_units 로드
    const { data:units } = await sb.from('product_units')
      .select('*').eq('product_id',currentProduct.id).eq('is_active',true).order('box_qty');
    currentUnits = units||[];

    renderTable();
  });

  // ── 판매처 선택 ──
  $('sel-channel').addEventListener('change', async e=>{
    const opt = e.target.options[e.target.selectedIndex];
    if (!opt.dataset.info){ currentChannel=null; renderTable(); return; }
    currentChannel = JSON.parse(opt.dataset.info);

    // 판관비 자동 입력
    $('feeRate').value   = currentChannel.commission_rate||0;
    $('adType').value    = currentChannel.ad_type||'rate';
    $('adValue').value   = currentChannel.ad_value||0;
    $('promoType').value = currentChannel.promotion_type||'rate';
    $('promoValue').value= currentChannel.promotion_value||0;
    $('hqType').value    = currentChannel.hq_type||'rate';
    $('hqValue').value   = currentChannel.hq_value||0;
    $('divType').value   = currentChannel.div_type||'rate';
    $('divValue').value  = currentChannel.div_value||0;

    $('disp-chtype').value  = currentChannel.channel_type==='direct'?'직납채널':'위탁채널';
    $('disp-feebase').value = currentChannel.commission_base==='vat'?'VAT포함가 기준':'공급가 기준';

    // 직납이면 운반비율 로드 + 유통사이익율 표시
    const distBox = $('dist-box');
    if (currentChannel.channel_type==='direct'){
      await loadDirectFreight(currentChannel.id);
      const temp = currentProduct?.temperature||'실온';
      const fm = freightMaster[temp];
      distBox.style.display='block';
      distBox.textContent=`직납 · 유통사이익율 ${fm.dDist}% · 운반비율 ${fm.dRate}% (${temp} 기준)`;
      $('disp-freight').value = fm.dRate+'% (직납)';
    } else {
      distBox.style.display='none';
      const temp = currentProduct?.temperature||'실온';
      const fm = freightMaster[temp];
      $('disp-freight').value = comma(fm.consign)+'원/박스 (위탁)';
    }

    renderTable();
  });

  // 판관비 변경 시 재계산
  ['feeRate','adType','adValue','promoType','promoValue','hqType','hqValue','divType','divValue']
    .forEach(id=>$(id).addEventListener('change', renderTable));
  ['feeRate','adValue','promoValue','hqValue','divValue']
    .forEach(id=>$(id).addEventListener('input', renderTable));

  // ── 손익 계산 ──
  function calcProfit(price, boxQty){
    if (!price||!currentChannel||!currentProduct) return null;
    const vatEx = price/1.1;
    const isDirect = currentChannel.channel_type==='direct';
    const temp = currentProduct.temperature;
    const fm = freightMaster[temp]||{consign:0,dRate:0,dDist:0};

    const distRate   = isDirect ? fm.dDist : 0;
    const distProfit = isDirect ? vatEx*(distRate/100) : 0;
    const supply     = vatEx - distProfit;
    const cost       = (currentProduct.unit_cost||0) * boxQty;

    const feeBase = currentChannel.commission_base==='vat' ? price : supply;
    const fee     = feeBase * (parseFloat($('feeRate').value)||0) / 100;

    const adVal   = parseFloat($('adValue').value)||0;
    const ad      = $('adType').value==='fixed' ? adVal : supply*(adVal/100);
    const promoVal= parseFloat($('promoValue').value)||0;
    const promo   = $('promoType').value==='fixed' ? promoVal : supply*(promoVal/100);

    let freight;
    if (isDirect){ freight = supply*(fm.dRate/100); }
    else { freight = fm.consign/(boxQty||1); }

    const hqVal = parseFloat($('hqValue').value)||0;
    const hq    = $('hqType').value==='fixed' ? hqVal : supply*(hqVal/100);
    const divVal= parseFloat($('divValue').value)||0;
    const div   = $('divType').value==='fixed' ? divVal : supply*(divVal/100);

    const freightRate  = supply>0 ? freight/supply*100 : 0;
    const directProfit = supply - cost - fee - ad - promo - freight;
    const opProfit     = directProfit - hq - div;
    const opRate       = supply>0 ? opProfit/supply*100 : 0;

    return { price, vatEx, distRate, distProfit, supply, cost, fee, ad, promo,
             freight, freightRate, hq, div, directProfit, opProfit, opRate, isDirect };
  }

  // ── 결과 테이블 렌더링 ──
  function renderTable(){
    const tbody = $('result-body');
    $('detail-panel').classList.remove('show');
    $('action-row').style.display='none';

    if (!currentProduct||!currentChannel||currentUnits.length===0){
      tbody.innerHTML='<tr><td colspan="7" class="placeholder">'+(
        !currentProduct?'상품을 선택해 주세요':
        !currentChannel?'판매처를 선택해 주세요':
        '가격정책 페이지에서 입수량별 가격을 먼저 등록해 주세요'
      )+'</td></tr>';
      return;
    }

    tbody.innerHTML='';
    currentUnits.forEach((u,i)=>{
      const rn = calcProfit(u.normal_price, u.box_qty);
      const ra = calcProfit(u.always_price, u.box_qty);
      const rm = calcProfit(u.max_price,    u.box_qty);

      const tr = document.createElement('tr');
      tr.innerHTML=`
        <td class="tl">${u.box_qty}개입<br><span style="font-size:11px;color:var(--muted);">원가 ${comma((currentProduct.unit_cost||0)*u.box_qty)}원</span></td>
        <td class="bl">${u.normal_price?comma(u.normal_price)+'원':'-'}</td>
        <td>${rn?badge(rn.opRate):'-'}</td>
        <td class="bl">${u.always_price?comma(u.always_price)+'원':'-'}</td>
        <td>${ra?badge(ra.opRate):'-'}</td>
        <td class="bl">${u.max_price?comma(u.max_price)+'원':'-'}</td>
        <td>${rm?badge(rm.opRate):'-'}</td>`;

      tr.addEventListener('click',()=>{
        document.querySelectorAll('#result-body tr').forEach(r=>r.classList.remove('sel'));
        tr.classList.add('sel');
        showDetail(u.box_qty, rn, ra, rm);
      });
      tbody.appendChild(tr);
    });

    $('action-row').style.display='flex';
  }

  function badge(rate){
    const cls = rate>=20?'good':rate>=10?'caution':'bad';
    return `<span class="bdg ${cls}">${pct(rate)}</span>`;
  }

  // ── 상세 패널 ──
  function showDetail(qty, rn, ra, rm){
    $('detail-title').textContent = `${qty}개입 상세 손익 내역`;
    const grid = $('detail-grid');
    grid.innerHTML='';
    [{r:rn,label:'정상판매가',cls:'n'},{r:ra,label:'상시할인가',cls:'a'},{r:rm,label:'최대할인가',cls:'m'}]
    .forEach(({r,label,cls})=>{
      const col=document.createElement('div');
      col.className='dcol';
      if(!r||!r.price){
        col.innerHTML=`<div class="dcol-head ${cls}">${label}</div><p style="color:var(--muted);font-size:12px;padding:6px 0;">가격 미설정</p>`;
        grid.appendChild(col); return;
      }
      col.innerHTML=`
        <div class="dcol-head ${cls}">${label} ${comma(r.price)}원</div>
        ${r.isDirect?`<div class="dr"><span class="k">판매가 (÷1.1)</span><span class="v">${won(r.vatEx)}</span></div>
        <div class="dr"><span class="k">− 유통사이익 ${pct(r.distRate)}</span><span class="v">${won(r.distProfit)}</span></div>`:''}
        <div class="dr b"><span class="k">= 공급가</span><span class="v">${won(r.supply)}</span></div>
        <div class="dvl"></div>
        <div class="dr"><span class="k">− 상품원가</span><span class="v">${won(r.cost)}</span></div>
        <div class="dr"><span class="k">− 지급수수료</span><span class="v">${won(r.fee)}</span></div>
        <div class="dr"><span class="k">− 광고선전비</span><span class="v">${won(r.ad)}</span></div>
        <div class="dr"><span class="k">− 판매촉진비</span><span class="v">${won(r.promo)}</span></div>
        <div class="dr"><span class="k">− 운반비</span><span class="v">${won(r.freight)}</span></div>
        <div class="dr"><span class="k">− 본부공통비</span><span class="v">${won(r.hq)}</span></div>
        <div class="dr"><span class="k">− 부문공통비</span><span class="v">${won(r.div)}</span></div>
        <div class="dvl"></div>
        <div class="dr b"><span class="k">영업이익</span><span class="v" style="color:${r.opRate>=10?'var(--good)':'var(--bad)'}">${won(r.opProfit)}</span></div>
        <div class="dr b"><span class="k">이익률</span><span class="v" style="color:${r.opRate>=10?'var(--good)':'var(--bad)'}">${pct(r.opRate)}</span></div>`;
      grid.appendChild(col);
    });
    $('detail-panel').classList.add('show');
  }

  // ── 가격정책에 반영 (master/admin) ──
  $('btn-apply-pricing').addEventListener('click', async()=>{
    if (!currentProduct||currentUnits.length===0){ alert('상품과 입수량 데이터가 필요합니다.'); return; }
    if (!confirm('현재 시뮬레이터 설정을 가격정책에 반영할까요?\n기존 가격정책이 덮어씌워집니다.')) return;

    const upsertData = currentUnits.map(u=>({
      product_id:   currentProduct.id,
      box_qty:      u.box_qty,
      normal_price: u.normal_price,
      always_price: u.always_price,
      max_price:    u.max_price,
      is_active:    true,
      updated_by:   me.id,
      updated_at:   new Date().toISOString(),
    }));
    await sb.from('product_units').delete().eq('product_id',currentProduct.id);
    const { error } = await sb.from('product_units').insert(upsertData);
    if (error){ alert('반영 실패: '+error.message); return; }
    flash('✓ 가격정책에 반영됐어요');
  });

  // ── 시나리오 저장 (일반user) ──
  $('btn-save-scenario').addEventListener('click', async()=>{
    if (!currentProduct||!currentChannel||currentUnits.length===0){ alert('상품과 판매처를 선택해 주세요.'); return; }
    const title = prompt('시나리오 이름을 입력하세요', `${currentProduct.name} × ${currentChannel.name}`);
    if (!title) return;

    const rows = currentUnits.map(u=>({
      user_id:      me.id,
      title:        title,
      product_id:   currentProduct.id,
      channel_id:   currentChannel.id,
      box_qty:      u.box_qty,
      normal_price: u.normal_price,
      always_price: u.always_price,
      max_price:    u.max_price,
      created_at:   new Date().toISOString(),
      updated_at:   new Date().toISOString(),
    }));
    const { error } = await sb.from('scenarios').insert(rows);
    if (error){ alert('저장 실패: '+error.message); return; }
    flash('✓ 시나리오 저장됐어요');
  });

  function flash(msg){
    const el=$('saved-msg');
    el.textContent=msg;
    el.classList.add('show');
    setTimeout(()=>el.classList.remove('show'),2500);
  }
</script>
</body>
