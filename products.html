<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>상품 마스터 · 순수본 식품본부</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --bg:#f4f6f3; --panel:#ffffff; --ink:#1d2620; --muted:#6b7770; --line:#e3e8e3;
      --accent:#2f7d4f; --accent-soft:#e7f2ec; --warn:#b4441f; --radius:12px;
      --shadow:0 1px 2px rgba(20,40,30,.05),0 8px 24px rgba(20,40,30,.06);
    }
    *{box-sizing:border-box;} html,body{margin:0;padding:0;}
    body{font-family:"Pretendard",-apple-system,"Malgun Gothic",sans-serif;background:var(--bg);color:var(--ink);font-size:15px;line-height:1.5;}
    header{background:var(--panel);border-bottom:1px solid var(--line);padding:14px 22px;display:flex;align-items:center;justify-content:space-between;gap:16px;position:sticky;top:0;z-index:10;}
    .brand{display:flex;align-items:center;gap:10px;}
    .brand .dot{width:10px;height:10px;border-radius:50%;background:var(--accent);}
    .brand h1{font-size:17px;margin:0;font-weight:700;}
    .brand small{color:var(--muted);font-weight:500;}
    .who{display:flex;align-items:center;gap:12px;font-size:13px;color:var(--muted);}
    .role-badge{background:var(--accent-soft);color:var(--accent);padding:3px 9px;border-radius:999px;font-weight:600;font-size:12px;}
    main{max-width:960px;margin:24px auto;padding:0 18px;}
    .toolbar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:16px;}
    .toolbar .search{flex:1;min-width:200px;padding:10px 14px;border:1px solid var(--line);border-radius:10px;background:var(--panel);font-size:14px;}
    .toolbar .search:focus{outline:none;border-color:var(--accent);}
    .chk{display:flex;align-items:center;gap:6px;color:var(--muted);font-size:13px;cursor:pointer;user-select:none;}
    button{font-family:inherit;cursor:pointer;border:none;border-radius:10px;font-size:14px;font-weight:600;padding:10px 16px;transition:.12s;}
    .btn-primary{background:var(--accent);color:#fff;} .btn-primary:hover{background:#266a42;}
    .btn-ghost{background:var(--panel);color:var(--ink);border:1px solid var(--line);} .btn-ghost:hover{background:#f0f3f0;}
    .btn-danger{background:#fff;color:var(--warn);border:1px solid #f5c4b3;} .btn-danger:hover{background:#fef2f2;}
    .btn-sm{padding:6px 12px;font-size:13px;}
    .card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;}
    table{width:100%;border-collapse:collapse;}
    thead th{text-align:left;font-size:12.5px;color:var(--muted);font-weight:600;padding:12px 14px;border-bottom:1px solid var(--line);white-space:nowrap;background:#fafbfa;}
    th.num,td.num{text-align:right;}
    tbody td{padding:13px 14px;border-bottom:1px solid var(--line);font-size:14px;}
    tbody tr:last-child td{border-bottom:none;}
    tbody tr:hover{background:#f7faf8;}
    tbody tr.inactive{opacity:.5;}
    .code{font-weight:600;}
    .temp-tag{font-size:12px;padding:2px 8px;border-radius:6px;background:#eef1ef;color:#45504a;white-space:nowrap;}
    .status-on{color:var(--accent);font-weight:600;font-size:13px;}
    .status-off{color:var(--warn);font-weight:600;font-size:13px;}
    .empty{padding:48px 20px;text-align:center;color:var(--muted);}
    .gate{max-width:420px;margin:80px auto;text-align:center;padding:0 20px;}
    .gate .icon{font-size:40px;} .gate h2{margin:14px 0 8px;} .gate p{color:var(--muted);margin:0 0 20px;}
    .overlay{position:fixed;inset:0;background:rgba(20,30,25,.45);display:none;align-items:center;justify-content:center;z-index:50;padding:20px;}
    .overlay.show{display:flex;}
    .modal{background:var(--panel);border-radius:16px;width:100%;max-width:480px;box-shadow:0 20px 60px rgba(0,0,0,.25);max-height:90vh;overflow:auto;}
    .modal-head{padding:20px 24px;border-bottom:1px solid var(--line);font-size:17px;font-weight:700;}
    .modal-body{padding:22px 24px;display:grid;grid-template-columns:1fr 1fr;gap:16px;}
    .field{display:flex;flex-direction:column;gap:6px;}
    .field.full{grid-column:1/-1;}
    .field label{font-size:13px;color:var(--muted);font-weight:600;}
    .field label .req{color:var(--warn);}
    .field input,.field select{font-family:inherit;font-size:14px;padding:10px 12px;border:1px solid var(--line);border-radius:9px;background:#fff;color:var(--ink);}
    .field input:focus,.field select:focus{outline:none;border-color:var(--accent);}
    .field input.num{text-align:right;}
    .field .hint{font-size:12px;color:var(--muted);}
    .modal-foot{padding:16px 24px;border-top:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;gap:10px;}
    .modal-foot-right{display:flex;gap:10px;}

    /* 삭제 확인 모달 */
    .confirm-overlay{position:fixed;inset:0;background:rgba(20,30,25,.55);display:none;align-items:center;justify-content:center;z-index:60;padding:20px;}
    .confirm-overlay.show{display:flex;}
    .confirm-modal{background:var(--panel);border-radius:16px;width:100%;max-width:380px;box-shadow:0 20px 60px rgba(0,0,0,.3);padding:28px 24px;}
    .confirm-modal .icon{font-size:32px;margin-bottom:12px;}
    .confirm-modal h3{font-size:16px;font-weight:700;margin:0 0 8px;}
    .confirm-modal p{font-size:13px;color:var(--muted);margin:0 0 20px;line-height:1.6;}
    .confirm-modal .warn-box{background:#fef2f2;border:1px solid #f5c4b3;border-radius:8px;padding:10px 14px;font-size:12px;color:var(--warn);margin-bottom:20px;line-height:1.5;}
    .confirm-modal .btns{display:flex;gap:10px;justify-content:flex-end;}
  </style>
</head>
<body>

<div class="ssbon-nav">
  <div class="ssbon-nav-inner">
    <span class="ssbon-nav-brand"><i class="ssbon-nav-dot"></i>순수본 가격도구</span>
    <nav class="ssbon-nav-links">
      <a href="simulator.html" data-nav="simulator.html">가격 시뮬레이터</a>
      <a href="pricing.html" data-nav="pricing.html">가격정책</a>
      <a href="products.html" data-nav="products.html">상품 마스터</a>
      <a href="channels.html" data-nav="channels.html">채널 마스터</a>
      <a href="freight.html" data-nav="freight.html">운반비 마스터</a>
    </nav>
  </div>
</div>
<style>
  .ssbon-nav{background:#fff;border-bottom:1px solid #e3e8e3;font-family:"Pretendard",-apple-system,"Malgun Gothic",sans-serif;}
  .ssbon-nav-inner{max-width:1100px;margin:0 auto;padding:0 18px;height:48px;display:flex;align-items:center;gap:20px;}
  .ssbon-nav-brand{display:flex;align-items:center;gap:7px;font-size:13px;font-weight:700;color:#1d2620;white-space:nowrap;}
  .ssbon-nav-dot{width:8px;height:8px;border-radius:50%;background:#2f7d4f;display:inline-block;}
  .ssbon-nav-links{display:flex;gap:6px;}
  .ssbon-nav-links a{text-decoration:none;font-size:14px;font-weight:600;color:#6b7770;padding:7px 13px;border-radius:8px;transition:.12s;}
  .ssbon-nav-links a:hover{background:#f0f3f0;color:#1d2620;}
  .ssbon-nav-links a.active{background:#e7f2ec;color:#2f7d4f;}
</style>
<script>
  (function(){
    var page=location.pathname.split("/").pop()||"index.html";
    document.querySelectorAll('.ssbon-nav-links a[data-nav]').forEach(function(a){
      if(a.getAttribute("data-nav")===page) a.classList.add("active");
    });
  })();
</script>

<div id="gate" class="gate" style="display:none;">
  <div class="icon" id="gate-icon">🔒</div>
  <h2 id="gate-title">확인 중…</h2>
  <p id="gate-msg"></p>
  <button class="btn-primary" id="gate-btn" style="display:none;"></button>
</div>

<div id="app" style="display:none;">
  <header>
    <div class="brand"><span class="dot"></span><h1>상품 마스터 <small>· 순수본 식품본부</small></h1></div>
    <div class="who">
      <span id="who-name"></span>
      <span class="role-badge" id="who-role"></span>
      <button class="btn-ghost btn-sm" id="btn-logout">로그아웃</button>
    </div>
  </header>

  <main>
    <div class="toolbar">
      <input class="search" id="search" placeholder="ERP코드 또는 상품명으로 검색…" />
      <label class="chk"><input type="checkbox" id="show-inactive" /> 비활성 포함</label>
      <button class="btn-primary" id="btn-new" style="display:none;">+ 새 상품</button>
    </div>
    <div class="card">
      <table>
        <thead>
          <tr>
            <th>ERP코드</th>
            <th>상품명</th>
            <th>품온</th>
            <th class="num">단량 (g)</th>
            <th class="num">상품원가 (EA)</th>
            <th class="num">정상가 (EA)</th>
            <th>상태</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="rows"></tbody>
      </table>
      <div class="empty" id="empty" style="display:none;">등록된 상품이 없어요.</div>
    </div>
  </main>
</div>

<!-- 수정 모달 -->
<div class="overlay" id="overlay">
  <div class="modal">
    <div class="modal-head" id="modal-title">새 상품</div>
    <div class="modal-body">
      <div class="field">
        <label>ERP코드 <span class="req">*</span></label>
        <input id="f-code" placeholder="예: A001" />
      </div>
      <div class="field">
        <label>품온 <span class="req">*</span></label>
        <select id="f-temp">
          <option value="실온">실온</option>
          <option value="냉장">냉장</option>
          <option value="냉동">냉동</option>
        </select>
      </div>
      <div class="field full">
        <label>상품명 <span class="req">*</span></label>
        <input id="f-name" placeholder="예: 순수본 전복죽 500g" />
      </div>
      <div class="field">
        <label>단량 (g)</label>
        <input id="f-weight" class="num" inputmode="numeric" placeholder="0" />
      </div>
      <div class="field">
        <label>상품원가 (원/EA, VAT별도)</label>
        <input id="f-cost" class="num" inputmode="numeric" placeholder="0" />
      </div>
      <div class="field full">
        <label>정상가 (원/EA, VAT포함)</label>
        <input id="f-normal" class="num" inputmode="numeric" placeholder="0" />
        <span class="hint">※ 입수량별 판매가격은 가격정책 페이지에서 설정합니다</span>
      </div>
    </div>
    <div class="modal-foot">
      <!-- 수정 모달에서만 삭제 버튼 표시 -->
      <button class="btn-danger btn-sm" id="btn-delete" style="display:none;">🗑 삭제</button>
      <div class="modal-foot-right">
        <button class="btn-ghost" id="btn-cancel">취소</button>
        <button class="btn-primary" id="btn-save">저장</button>
      </div>
    </div>
  </div>
</div>

<!-- 삭제 확인 모달 -->
<div class="confirm-overlay" id="confirm-overlay">
  <div class="confirm-modal">
    <div class="icon">⚠️</div>
    <h3 id="confirm-title">상품 삭제</h3>
    <p id="confirm-msg"></p>
    <div class="warn-box" id="confirm-warn"></div>
    <div class="btns">
      <button class="btn-ghost" id="confirm-cancel">취소</button>
      <button class="btn-danger" id="confirm-ok">삭제</button>
    </div>
  </div>
</div>

<script>
  const SUPABASE_URL = "https://ngvgzfhvjaowwhnmmpex.supabase.co";
  const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5ndmd6Zmh2amFvd3dobm1tcGV4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAwMzgyNjQsImV4cCI6MjA5NTYxNDI2NH0.jO5Ab8trHPyamHhYFXi9UWvQ217pDJW9qplBWph8cgg";
  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  let me = null, canEdit = false, products = [], editingId = null, deletingProduct = null;
  const $ = (id) => document.getElementById(id);
  const comma = (n) => Number(n||0).toLocaleString("ko-KR");
  const unComma = (v) => Number(String(v).replace(/[^\d]/g,""))||0;

  async function init() {
    const { data: { session } } = await sb.auth.getSession();
    if (!session) return showGate("🔒","로그인이 필요해요","먼저 로그인해 주세요.","로그인하러 가기",goLogin);
    const { data } = await sb.from("users").select("*").eq("id",session.user.id).single();
    if (!data) return showGate("⚠️","사용자 정보를 찾을 수 없어요","관리자에게 문의해 주세요.","로그아웃",logout);
    me = data;
    if (me.role==="pending"||me.is_active===false) return showGate("⏳","승인 대기 중이에요","관리자 승인 후 이용 가능합니다.","로그아웃",logout);
    canEdit = (me.role==="master"||me.role==="admin");
    showApp();
    await loadProducts();
  }

  function showGate(icon,title,msg,btnText,btnFn) {
    $("app").style.display="none"; $("gate").style.display="block";
    $("gate-icon").textContent=icon; $("gate-title").textContent=title; $("gate-msg").textContent=msg;
    const b=$("gate-btn");
    if(btnText){b.style.display="inline-block";b.textContent=btnText;b.onclick=btnFn;}
    else b.style.display="none";
  }
  function showApp() {
    $("gate").style.display="none"; $("app").style.display="block";
    $("who-name").textContent=me.name||me.email||"사용자";
    $("who-role").textContent=me.role;
    $("btn-new").style.display=canEdit?"inline-block":"none";
  }
  function goLogin(){location.href="index.html";}
  async function logout(){await sb.auth.signOut();goLogin();}

  async function loadProducts() {
    const { data,error } = await sb.from("products").select("*").order("code",{ascending:true});
    if (error){alert("불러오기 실패: "+error.message);return;}
    products = data||[];
    renderTable();
  }

  function renderTable() {
    const keyword=$("search").value.trim().toLowerCase();
    const includeInactive=$("show-inactive").checked;
    const list=products.filter(p=>{
      if(!includeInactive&&p.is_active===false) return false;
      if(!keyword) return true;
      return (p.code||"").toLowerCase().includes(keyword)||(p.name||"").toLowerCase().includes(keyword);
    });
    const tbody=$("rows");
    tbody.innerHTML="";
    $("empty").style.display=list.length?"none":"block";
    list.forEach(p=>{
      const tr=document.createElement("tr");
      if(p.is_active===false) tr.className="inactive";
      tr.innerHTML=`
        <td class="code">${esc(p.code)}</td>
        <td>${esc(p.name)}</td>
        <td><span class="temp-tag">${esc(p.temperature)}</span></td>
        <td class="num">${comma(p.unit_weight)}</td>
        <td class="num">${comma(p.unit_cost)}</td>
        <td class="num">${comma(p.normal_price)}</td>
        <td>${p.is_active===false?'<span class="status-off">비활성</span>':'<span class="status-on">활성</span>'}</td>
        <td></td>`;
      if(canEdit){
        const cell=tr.lastElementChild;
        const edit=document.createElement("button");
        edit.className="btn-ghost btn-sm"; edit.textContent="수정";
        edit.onclick=()=>openModal(p); cell.appendChild(edit);
        const tog=document.createElement("button");
        tog.className="btn-ghost btn-sm"; tog.style.marginLeft="6px";
        tog.textContent=p.is_active===false?"활성화":"비활성";
        tog.onclick=()=>toggleActive(p); cell.appendChild(tog);
      }
      tbody.appendChild(tr);
    });
  }

  function esc(s){return String(s??"").replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}

  function openModal(p) {
    editingId=p?p.id:null;
    $("modal-title").textContent=p?"상품 수정":"새 상품";
    $("f-code").value=p?p.code:""; $("f-code").disabled=!!p;
    $("f-name").value=p?p.name:"";
    $("f-temp").value=p?p.temperature:"실온";
    $("f-weight").value=p?comma(p.unit_weight):"";
    $("f-cost").value=p?comma(p.unit_cost):"";
    $("f-normal").value=p?comma(p.normal_price):"";
    // 삭제 버튼: 수정 모드(기존 상품)에서만 표시
    $("btn-delete").style.display = p ? "inline-block" : "none";
    if(p) $("btn-delete").onclick = ()=>{ closeModal(); openConfirmDelete(p); };
    $("overlay").classList.add("show");
  }
  function closeModal(){$("overlay").classList.remove("show");}

  // ── 삭제 확인 모달 ──
  function openConfirmDelete(p) {
    deletingProduct = p;
    $("confirm-title").textContent = `'${p.name}' 삭제`;
    $("confirm-msg").textContent = `ERP코드 ${p.code} · ${p.name}을(를) 완전히 삭제합니다.`;
    $("confirm-warn").innerHTML =
      `⚠️ 삭제하면 이 상품의 <strong>가격정책(입수량별 가격)</strong>과 <strong>시나리오 데이터</strong>도 함께 삭제됩니다.<br>이 작업은 되돌릴 수 없습니다.`;
    $("confirm-overlay").classList.add("show");
  }
  function closeConfirm(){ $("confirm-overlay").classList.remove("show"); deletingProduct=null; }

  $("confirm-cancel").onclick = closeConfirm;
  $("confirm-ok").onclick = async()=>{
    if(!deletingProduct) return;
    const p = deletingProduct;
    closeConfirm();

    // product_units 먼저 삭제 (연관 데이터)
    await sb.from("product_units").delete().eq("product_id", p.id);
    // scenarios 삭제
    await sb.from("scenarios").delete().eq("product_id", p.id);
    // products 삭제
    const { error } = await sb.from("products").delete().eq("id", p.id);
    if(error){ alert("삭제 실패: "+error.message); return; }
    await loadProducts();
  };

  async function saveProduct() {
    const payload={
      code:$("f-code").value.trim(),
      name:$("f-name").value.trim(),
      temperature:$("f-temp").value,
      unit_weight:unComma($("f-weight").value),
      unit_cost:unComma($("f-cost").value),
      normal_price:unComma($("f-normal").value),
      updated_by:me.id,
      updated_at:new Date().toISOString(),
    };
    if(!payload.code||!payload.name||!payload.temperature){alert("ERP코드·상품명·품온은 필수입니다.");return;}
    let error;
    if(editingId===null){
      if(products.some(p=>p.code===payload.code)){alert("이미 같은 ERP코드가 있어요.");return;}
      payload.created_by=me.id;
      ({error}=await sb.from("products").insert(payload));
    } else {
      ({error}=await sb.from("products").update(payload).eq("id",editingId));
    }
    if(error){alert("저장 실패: "+error.message);return;}
    closeModal();
    await loadProducts();
  }

  async function toggleActive(p) {
    const next=!(p.is_active!==false);
    if(!confirm(`'${p.name}' 상품을 ${next?"활성화":"비활성"} 할까요?`)) return;
    const {error}=await sb.from("products").update({is_active:next,updated_by:me.id,updated_at:new Date().toISOString()}).eq("id",p.id);
    if(error){alert("처리 실패: "+error.message);return;}
    await loadProducts();
  }

  ["f-weight","f-cost","f-normal"].forEach(id=>{
    $(id).addEventListener("input",e=>{
      const d=e.target.value.replace(/[^\d]/g,"");
      e.target.value=d?Number(d).toLocaleString("ko-KR"):"";
    });
  });

  $("btn-new").onclick=()=>openModal(null);
  $("btn-cancel").onclick=closeModal;
  $("btn-save").onclick=saveProduct;
  $("btn-logout").onclick=logout;
  $("search").addEventListener("input",renderTable);
  $("show-inactive").addEventListener("change",renderTable);
  $("overlay").addEventListener("click",e=>{if(e.target.id==="overlay")closeModal();});
  $("confirm-overlay").addEventListener("click",e=>{if(e.target.id==="confirm-overlay")closeConfirm();});

  init();
</script>
</body>
</html>
