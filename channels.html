<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>채널 마스터 · 순수본 식품본부</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --bg:#f4f6f3; --panel:#ffffff; --ink:#1d2620; --muted:#6b7770; --line:#e3e8e3;
      --accent:#2f7d4f; --accent-soft:#e7f2ec; --warn:#b4441f;
      --radius:12px; --shadow:0 1px 2px rgba(20,40,30,.05),0 8px 24px rgba(20,40,30,.06);
    }
    *{box-sizing:border-box;} html,body{margin:0;padding:0;}
    body{font-family:"Pretendard",-apple-system,"Malgun Gothic",sans-serif;background:var(--bg);color:var(--ink);font-size:15px;line-height:1.5;}
    .ssbon-nav{background:#fff;border-bottom:1px solid var(--line);}
    .ssbon-nav-inner{max-width:1180px;margin:0 auto;padding:0 18px;min-height:48px;display:flex;align-items:center;gap:20px;flex-wrap:wrap;}
    .ssbon-nav-brand{display:flex;align-items:center;gap:7px;font-size:13px;font-weight:700;color:var(--ink);white-space:nowrap;}
    .ssbon-nav-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);display:inline-block;}
    .ssbon-nav-links{display:flex;gap:6px;}
    .ssbon-nav-links a{text-decoration:none;font-size:14px;font-weight:600;color:var(--muted);padding:7px 13px;border-radius:8px;transition:.12s;}
    .ssbon-nav-links a:hover{background:#f0f3f0;color:var(--ink);}
    .ssbon-nav-links a.active{background:var(--accent-soft);color:var(--accent);}
    header{background:var(--panel);border-bottom:1px solid var(--line);padding:14px 22px;display:flex;align-items:center;justify-content:space-between;gap:16px;}
    .brand h1{font-size:17px;margin:0;font-weight:700;}
    .brand small{color:var(--muted);font-weight:500;}
    .who{display:flex;align-items:center;gap:12px;font-size:13px;color:var(--muted);}
    .role-badge{background:var(--accent-soft);color:var(--accent);padding:3px 9px;border-radius:999px;font-weight:600;font-size:12px;}
    main{max-width:1180px;margin:24px auto;padding:0 18px;}
    .toolbar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:16px;}
    .toolbar .search{flex:1;min-width:200px;padding:10px 14px;border:1px solid var(--line);border-radius:10px;background:var(--panel);font-size:14px;}
    .toolbar .search:focus{outline:none;border-color:var(--accent);}
    .chk{display:flex;align-items:center;gap:6px;color:var(--muted);font-size:13px;cursor:pointer;user-select:none;}
    button{font-family:inherit;cursor:pointer;border:none;border-radius:10px;font-size:14px;font-weight:600;padding:10px 16px;transition:.12s;}
    .btn-primary{background:var(--accent);color:#fff;} .btn-primary:hover{background:#266a42;}
    .btn-ghost{background:var(--panel);color:var(--ink);border:1px solid var(--line);} .btn-ghost:hover{background:#f0f3f0;}
    .btn-sm{padding:6px 12px;font-size:13px;}
    .card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);overflow-x:auto;}
    table{width:100%;border-collapse:collapse;min-width:960px;}
    thead th{text-align:left;font-size:12px;color:var(--muted);font-weight:600;padding:10px 10px;border-bottom:1px solid var(--line);white-space:nowrap;background:#fafbfa;}
    th.num,td.num{text-align:right;}
    th.ctr,td.ctr{text-align:center;}
    tbody td{padding:10px 10px;border-bottom:1px solid var(--line);font-size:13px;white-space:nowrap;}
    tbody tr:last-child td{border-bottom:none;}
    tbody tr:hover{background:#f7faf8;}
    tbody tr.inactive{opacity:.5;}
    .cname{font-weight:600;}
    .type-tag{font-size:12px;padding:2px 8px;border-radius:6px;font-weight:600;}
    .type-consign{background:#eef1ef;color:#45504a;}
    .type-direct{background:#e7f2ec;color:var(--accent);}
    .sub{color:var(--muted);font-size:12px;}
    .status-on{color:var(--accent);font-weight:600;font-size:13px;}
    .status-off{color:var(--warn);font-weight:600;font-size:13px;}
    .dist-rate-cell{color:var(--accent);font-weight:600;}
    .empty{padding:48px 20px;text-align:center;color:var(--muted);}
    .gate{max-width:420px;margin:80px auto;text-align:center;padding:0 20px;}
    .gate .icon{font-size:40px;} .gate h2{margin:14px 0 8px;} .gate p{color:var(--muted);margin:0 0 20px;}

    /* 모달 */
    .overlay{position:fixed;inset:0;background:rgba(20,30,25,.45);display:none;align-items:flex-start;justify-content:center;z-index:50;padding:20px;overflow-y:auto;}
    .overlay.show{display:flex;}
    .modal{background:var(--panel);border-radius:16px;width:min(800px, calc(100vw - 40px));box-shadow:0 20px 60px rgba(0,0,0,.25);max-height:90vh;overflow-y:auto;}
    .modal-head{padding:20px 24px;border-bottom:1px solid var(--line);font-size:17px;font-weight:700;}
    .modal-body{padding:20px 20px;display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px;}
    .field{display:flex;flex-direction:column;gap:6px;}
    .field.full{grid-column:1/-1;}
    .field label{font-size:13px;color:var(--muted);font-weight:600;}
    .field label .req{color:var(--warn);}
    .field input,.field select{font-family:inherit;font-size:14px;padding:10px 12px;border:1px solid var(--line);border-radius:9px;background:#fff;color:var(--ink);}
    .field input:focus,.field select:focus{outline:none;border-color:var(--accent);}
    .field input.num{text-align:right;}
    .combo{display:flex;gap:8px;min-width:0;}
    .combo select{flex:0 0 88px;min-width:0;}
    .combo input{flex:1;min-width:0;}
    .subhead{grid-column:1/-1;font-size:12px;font-weight:700;color:var(--accent);letter-spacing:.03em;margin-top:4px;border-top:1px solid var(--line);padding-top:14px;}
    .modal-foot{padding:16px 24px;border-top:1px solid var(--line);display:flex;justify-content:flex-end;gap:10px;}

    /* 직납 품온별 테이블 */
    .direct-section{grid-column:1/-1;display:none;overflow:hidden;}
    .direct-section.show{display:block;}
    .direct-section .sec-title{font-size:12px;font-weight:700;color:var(--accent);letter-spacing:.03em;margin-bottom:10px;padding-top:14px;border-top:1px solid var(--line);}
    .direct-hint{font-size:11px;color:var(--muted);margin-top:6px;}
    /* ── 공통 NAV ── */
  .ssbon-nav{background:#fff;border-bottom:1px solid #e3e8e3;position:sticky;top:0;z-index:100;}
  .ssbon-nav-inner{max-width:1400px;margin:0 auto;padding:0 20px;height:52px;display:flex;align-items:center;}
  .ssbon-nav-brand{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:700;color:#1d2620;white-space:nowrap;margin-right:24px;text-decoration:none;}
  .ssbon-nav-dot{width:8px;height:8px;border-radius:50%;background:#2f7d4f;display:inline-block;flex-shrink:0;}
  .ssbon-nav-links{display:flex;gap:2px;flex:1;}
  .ssbon-nav-links a{text-decoration:none;font-size:13px;font-weight:600;color:#6b7770;padding:6px 12px;border-radius:8px;transition:.12s;white-space:nowrap;}
  .ssbon-nav-links a:hover{background:#f0f3f0;color:#1d2620;}
  .ssbon-nav-links a.active{background:#e7f2ec;color:#2f7d4f;}
  .ssbon-nav-right{margin-left:auto;display:flex;align-items:center;gap:8px;padding-left:16px;}
  .ssbon-who{font-size:12px;color:#6b7770;white-space:nowrap;}
  .ssbon-role{background:#e7f2ec;color:#2f7d4f;padding:2px 8px;border-radius:999px;font-size:11px;font-weight:700;}
  .ssbon-nav-btn{font-family:inherit;font-size:12px;font-weight:600;padding:5px 12px;border-radius:8px;cursor:pointer;color:#2f7d4f;background:#fff;border:1px solid #e3e8e3;}
  .ssbon-nav-btn:hover{background:#f0f3f0;}
  .ssbon-nav-btn.primary{color:#fff;background:#2f7d4f;border-color:#2f7d4f;}
  .ssbon-nav-btn.primary:hover{background:#266a42;}
  </style>
</head>

<script>

<div id="gate" class="gate" style="display:none;">
  <div class="icon" id="gate-icon">🔒</div>
  <h2 id="gate-title">확인 중…</h2>
  <p id="gate-msg"></p>

</div>

<div id="app" style="display:none;">
  
  <main>
    <div class="toolbar">
      <input class="search" id="search" placeholder="채널명으로 검색…" />
      <label class="chk"><input type="checkbox" id="show-inactive" /> 비활성 포함</label>

    </div>
    <div class="card">

        <thead>

</div>

<!-- 모달 -->
<div class="overlay" id="overlay">

</div>

<script>
  const SUPABASE_URL = "https://ngvgzfhvjaowwhnmmpex.supabase.co";
  const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5ndmd6Zmh2amFvd3dobm1tcGV4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAwMzgyNjQsImV4cCI6MjA5NTYxNDI2NH0.jO5Ab8trHPyamHhYFXi9UWvQ217pDJW9qplBWph8cgg";
  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  function initNav(user) {
    var who = document.getElementById('nav-who');
    var role = document.getElementById('nav-role');
    var adminBtn = document.getElementById('nav-admin-btn');
    var logoutBtn = document.getElementById('nav-logout-btn');
    if(who) who.textContent = (user.name||user.email||'');
    if(role){ role.textContent = user.role||''; role.style.display='inline'; }
    if(adminBtn) adminBtn.style.display = (user.role==='admin')?'inline-block':'none';
    if(logoutBtn){
      logoutBtn.style.display='inline-block';
      logoutBtn.onclick = async function(){ await sb.auth.signOut(); location.href='index.html'; };
    }
  }

  const TEMPS = [{ko:'실온',id:'amb'},{ko:'냉장',id:'chi'},{ko:'냉동',id:'fro'}];
  let me=null, canEdit=false, channels=[], editingId=null;
  const $=(id)=>document.getElementById(id);
  const comma=(n)=>Number(n||0).toLocaleString("ko-KR");
  const numVal=(id)=>parseFloat($(id).value)||0;
  const typeTag=(t)=>t==="direct"
    ?'<span class="type-tag type-direct">직납</span>'
    :'<span class="type-tag type-consign">위탁</span>';
  const baseLabel=(b)=>b==="vat"?"VAT포함가":"공급가";
  const tv=(type,value)=>type==="fixed"?(comma(value)+"원"):((value||0)+"%");

  $("f-chtype").addEventListener("change", function(){
    $("direct-section").classList.toggle("show", this.value==="direct");
  });

  async function init(){
    const { data:{ session } } = await sb.auth.getSession();
    if (!session) return showGate("🔒","로그인이 필요해요","먼저 로그인해 주세요.","로그인하러 가기",goLogin);
    const { data,error } = await sb.from("users").select("*").eq("id",session.user.id).single();
    if (error||!data) return showGate("⚠️","사용자 정보를 찾을 수 없어요","관리자에게 문의해 주세요.","로그아웃",logout);
    me=data;
    if (me.role==="pending"||me.is_active===false) return showGate("⏳","승인 대기 중이에요","관리자 승인 후 이용 가능합니다.","로그아웃",logout);
    canEdit=(me.role==="master"||me.role==="admin");
    showApp(); await loadChannels();
  }

  function showGate(icon,title,msg,btnText,btnFn){
    $("app").style.display="none"; $("gate").style.display="block";
    $("gate-icon").textContent=icon; $("gate-title").textContent=title; $("gate-msg").textContent=msg;
    const b=$("gate-btn");
    if(btnText){b.style.display="inline-block";b.textContent=btnText;b.onclick=btnFn;}
    else b.style.display="none";
  }
  function showApp(){
    $("gate").style.display="none"; $("app").style.display="block";
      initNav(me);
    $("btn-new").style.display=canEdit?"inline-block":"none";
  }
  function goLogin(){location.href="index.html";}
  async function logout(){await sb.auth.signOut();goLogin();}

  async function loadChannels(){
    // channels + channel_logistics 조인해서 유통사이익율 가져오기
    const { data,error }=await sb.from("channels").select("*").order("name",{ascending:true});
    if (error){alert("채널을 불러오지 못했어요: "+error.message);return;}

    // 직납 채널의 품온별 유통사이익율 로드
    const directIds = (data||[]).filter(c=>c.channel_type==='direct').map(c=>c.id);
    let logisticsMap = {}; // channel_id => {실온: x, 냉장: y, 냉동: z}
    if(directIds.length>0){
      const { data:logData } = await sb.from("channel_logistics").select("*").in("channel_id", directIds);
      if(logData) logData.forEach(r=>{
        if(!logisticsMap[r.channel_id]) logisticsMap[r.channel_id]={};
        logisticsMap[r.channel_id][r.temperature] = r.dist_rate||0;
      });
    }

    channels=(data||[]).map(c=>({...c, _logistics: logisticsMap[c.id]||{}}));
    renderTable();
  }

  function renderTable(){
    const keyword=$("search").value.trim().toLowerCase();
    const includeInactive=$("show-inactive").checked;
    const list=channels.filter(c=>{
      if(!includeInactive&&c.is_active===false) return false;
      if(!keyword) return true;
      return (c.name||"").toLowerCase().includes(keyword);
    });
    const tbody=$("rows"); tbody.innerHTML="";
    $("empty").style.display=list.length?"none":"block";
    list.forEach(c=>{
      const tr=document.createElement("tr");
      if(c.is_active===false) tr.className="inactive";

      // 직납채널이면 품온별 유통사이익율 표시
      let distRateCell = '-';
      if(c.channel_type==='direct' && c._logistics){
        const parts = ['실온','냉장','냉동']
          .map(t=> c._logistics[t]!=null ? `${t} ${c._logistics[t]}%` : null)
          .filter(Boolean);
        if(parts.length>0){
          distRateCell = `<span class="dist-rate-cell" style="font-size:12px;line-height:1.6;">${parts.join('<br>')}</span>`;
        }
      }

      tr.innerHTML=`
        <td class="cname">${esc(c.name)}</td>
        <td>${typeTag(c.channel_type)}</td>
        <td class="ctr">${c.is_representative
          ? '<span style="color:#2f7d4f;font-weight:700;font-size:13px;">★</span>'
          : '<span style="color:#ccc;font-size:13px;">☆</span>'}</td>
        <td class="ctr">${distRateCell}</td>
        <td style="max-width:120px;">${c.commission_rate||0}% <span class="sub">/ ${baseLabel(c.commission_base)}</span></td>
        <td class="num">${tv(c.ad_type,c.ad_value)}</td>
        <td class="num">${tv(c.promotion_type,c.promotion_value)}</td>
        <td class="num">${tv(c.hq_type,c.hq_value)}</td>
        <td class="num">${tv(c.div_type,c.div_value)}</td>
        <td class="num">${comma(c.other_fixed)}원</td>
        <td>${c.is_active===false?'<span class="status-off">비활성</span>':'<span class="status-on">활성</span>'}</td>
        <td></td>`;
      if(canEdit){
        const cell=tr.lastElementChild;
        const edit=document.createElement("button");
        edit.className="btn-ghost btn-sm"; edit.textContent="수정";
        edit.onclick=()=>openModal(c); cell.appendChild(edit);
        const tog=document.createElement("button");
        tog.className="btn-ghost btn-sm"; tog.style.marginLeft="6px";
        tog.textContent=c.is_active===false?"활성화":"비활성";
        tog.onclick=()=>toggleActive(c); cell.appendChild(tog);
        const repBtn=document.createElement("button");
        repBtn.className="btn-ghost btn-sm"; repBtn.style.marginLeft="6px";
        repBtn.textContent=c.is_representative?"★ 대표해제":"☆ 대표설정";
        repBtn.style.color=c.is_representative?"#2f7d4f":"#6b7770";
        repBtn.onclick=()=>toggleRepresentative(c); cell.appendChild(repBtn);
      }
      tbody.appendChild(tr);
    });
  }

  function esc(s){return String(s??"").replace(/[&<>"']/g,ch=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));}

  async function openModal(c){
    editingId=c?c.id:null;
    $("modal-title").textContent=c?"채널 수정":"새 채널";
    $("f-name").value=c?c.name:"";
    $("f-chtype").value=c?(c.channel_type||"consign"):"consign";
    $("f-base").value=c?(c.commission_base||"supply"):"supply";
    $("f-fee").value=c?(c.commission_rate??""):"";
    $("f-other").value=c?(c.other_fixed??""):"";
    $("f-adType").value=c?(c.ad_type||"rate"):"rate";
    $("f-adValue").value=c?(c.ad_value??""):"";
    $("f-promoType").value=c?(c.promotion_type||"rate"):"rate";
    $("f-promoValue").value=c?(c.promotion_value??""):"";
    $("f-hqType").value=c?(c.hq_type||"rate"):"rate";
    $("f-hqValue").value=c?(c.hq_value??""):"";
    $("f-divType").value=c?(c.div_type||"rate"):"rate";
    $("f-divValue").value=c?(c.div_value??""):"";
    const isDirect=(c?.channel_type==="direct");
    $("direct-section").classList.toggle("show", isDirect);
    if (isDirect && c?.id){
      const { data } = await sb.from("channel_logistics").select("*").eq("channel_id",c.id);
      TEMPS.forEach(t=>{ $("d-fr-"+t.id).value=0; $("d-dr-"+t.id).value=0; });
      if (data) data.forEach(r=>{
        const t=TEMPS.find(x=>x.ko===r.temperature);
        if(t){ $("d-fr-"+t.id).value=r.freight_rate||0; $("d-dr-"+t.id).value=r.dist_rate||0; }
      });
    } else {
      TEMPS.forEach(t=>{ $("d-fr-"+t.id).value=""; $("d-dr-"+t.id).value=""; });
    }
    $("overlay").classList.add("show");
  }
  function closeModal(){$("overlay").classList.remove("show");}

  async function saveChannel(){
    const payload={
      name:$("f-name").value.trim(),channel_type:$("f-chtype").value,
      commission_rate:numVal("f-fee"),commission_base:$("f-base").value,
      ad_type:$("f-adType").value,ad_value:numVal("f-adValue"),
      promotion_type:$("f-promoType").value,promotion_value:numVal("f-promoValue"),
      hq_type:$("f-hqType").value,hq_value:numVal("f-hqValue"),
      div_type:$("f-divType").value,div_value:numVal("f-divValue"),
      other_fixed:numVal("f-other"),updated_by:me.id,updated_at:new Date().toISOString(),
    };
    if(!payload.name){alert("채널명은 꼭 입력해야 해요.");return;}
    let channelId=editingId, error;
    if(editingId===null){
      if(channels.some(c=>c.name===payload.name)){alert("이미 같은 이름의 채널이 있어요.");return;}
      payload.created_by=me.id;
      const res=await sb.from("channels").insert(payload).select().single();
      error=res.error; if(!error) channelId=res.data.id;
    } else {
      ({error}=await sb.from("channels").update(payload).eq("id",editingId));
    }
    if(error){alert("저장 실패: "+error.message);return;}
    if(payload.channel_type==="direct" && channelId){
      const rows=TEMPS.map(t=>({
        channel_id:channelId,temperature:t.ko,
        freight_rate:parseFloat($("d-fr-"+t.id).value)||0,
        dist_rate:parseFloat($("d-dr-"+t.id).value)||0,
        updated_by:me.id,updated_at:new Date().toISOString(),
      }));
      const { error:lerr }=await sb.from("channel_logistics").upsert(rows,{onConflict:"channel_id,temperature"});
      if(lerr){alert("운반비 저장 실패: "+lerr.message);return;}
    }
    closeModal(); await loadChannels();
  }

  async function toggleActive(c){
    const next=!(c.is_active!==false);
    if(!confirm(`'${c.name}' 채널을 ${next?"활성화":"비활성"} 할까요?`)) return;
    const {error}=await sb.from("channels").update({is_active:next,updated_by:me.id,updated_at:new Date().toISOString()}).eq("id",c.id);
    if(error){alert("처리 실패: "+error.message);return;}
    await loadChannels();
  }

  async function toggleRepresentative(c){
    const next = !c.is_representative;
    // 같은 유형 내에서 기존 대표 해제 후 새로 설정
    if(next){
      if(!confirm(`'${c.name}'을(를) ${c.channel_type==='direct'?'직납':'위탁'} 채널의 대표채널로 설정할까요?\n기존 대표채널은 자동 해제됩니다.`)) return;
      // 같은 유형의 기존 대표 해제
      const sameType = channels.filter(ch=>ch.channel_type===c.channel_type && ch.is_representative && ch.id!==c.id);
      for(const ch of sameType){
        await sb.from("channels").update({is_representative:false,updated_by:me.id,updated_at:new Date().toISOString()}).eq("id",ch.id);
      }
    } else {
      if(!confirm(`'${c.name}' 대표채널 설정을 해제할까요?`)) return;
    }
    const {error}=await sb.from("channels").update({is_representative:next,updated_by:me.id,updated_at:new Date().toISOString()}).eq("id",c.id);
    if(error){alert("처리 실패: "+error.message);return;}
    await loadChannels();
  }

  $("btn-new").onclick=()=>openModal(null);
  $("btn-cancel").onclick=closeModal;
  $("btn-save").onclick=saveChannel;
  $("search").addEventListener("input",renderTable);
  $("show-inactive").addEventListener("change",renderTable);
  $("overlay").addEventListener("click",e=>{if(e.target.id==="overlay")closeModal();});

  init();
</script>
</body>
</html>
